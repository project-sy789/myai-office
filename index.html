<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>MyAI Office — Your AI Team</title>
<meta name="description" content="Hire AI agents, assign roles, and get real work done.">
<meta name="theme-color" content="#7c5cff">
<style>
:root{
  --bg:#0f0b1a;--bg2:#1a1530;--bg3:#221d3a;--card:#1e1940;--cardHover:#25204d;
  --ink:#f0edfa;--ink2:#b8b0d0;--muted:#7068a0;--line:#2a2550;
  --grape:#7c5cff;--coral:#ff6b5f;--leaf:#22c97a;--gold:#ffb43c;--pink:#ff7eb6;--sky:#38bdf8;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:system-ui,-apple-system,sans-serif;color:var(--ink);background:var(--bg);overflow:hidden}
#app{display:flex;flex-direction:column;height:100%;max-width:640px;margin:0 auto}
header{sdisplay:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg2);border-bottom:1px solid var(--line);flex-shrink:0;min-height:52px}
header .h-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
header .logo{font-weight:900;font-size:17px;letter-spacing:-.01em;cursor:pointer;white-space:nowrap}
header .logo b{color:var(--grape)}
header .badge{font-size:10px;font-weight:800;padding:2px 7px;border-radius:6px;background:var(--grape);color:#fff}
.spacer{flex:1}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 12px;border-radius:9px;font-weight:700;font-size:12.5px;cursor:pointer;border:none;background:var(--bg3);color:var(--ink);transition:all .15s;font-family:inherit;white-space:nowrap}
.btn:hover{filter:brightness(1.15)}
.btn.pri{background:var(--grape);color:#fff}
.btn.grn{background:var(--leaf);color:#fff}
.btn.red{background:var(--coral);color:#fff}
.btn.gho{background:transparent;color:var(--muted)}
.btn.gho:hover{color:var(--ink);background:transparent}
.btn.sm{padding:5px 9px;font-size:11px}
main{flex:1;overflow-y:auto;padding:12px;scroll-behavior:smooth}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:8px;cursor:pointer;transition:all .2s}
.card:hover{border-color:var(--grape);background:var(--cardHover)}
.card .c-head{display:flex;align-items:center;gap:10px}
.card .c-avatar{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;font-size:22px;flex-shrink:0}
.card .c-info{flex:1;min-width:0}
.card .c-name{font-weight:800;font-size:14px;line-height:1.2}
.card .c-role{font-size:10.5px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.card .c-meta{display:flex;gap:8px;margin-top:6px;font-size:10.5px;font-weight:700;color:var(--muted)}
.card .c-meta span{padding:2px 7px;border-radius:5px;background:var(--bg3)}
.card .c-task{font-size:11.5px;color:var(--ink2);margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty .e-icon{font-size:52px;margin-bottom:12px}
.empty h2{font-weight:900;margin-bottom:6px;color:var(--ink)}
.empty p{font-size:13px;margin-bottom:14px;line-height:1.4}
.chat-wrap{display:flex;flex-direction:column;height:100%}
.chat-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:6px}
.msg{max-width:88%;padding:10px 14px;border-radius:16px;font-size:13.5px;line-height:1.5;animation:msgIn .25s ease}
.msg.user{align-self:flex-end;background:var(--grape);color:#fff;border-bottom-right-radius:4px}
.msg.ai{align-self:flex-start;background:var(--card);border:1px solid var(--line);border-bottom-left-radius:4px}
.msg.ai .sender{font-size:10px;font-weight:800;color:var(--muted);margin-bottom:4px}
.msg p{margin:4px 0}
.msg ul,.msg ol{margin:4px 0;padding-left:20px}
.msg li{margin:2px 0}
.msg strong{color:var(--gold)}
.msg em{color:var(--ink2)}
.msg code{background:rgba(0,0,0,.3);padding:2px 6px;border-radius:4px;font-size:12px;font-family:'SF Mono',monospace}
.msg pre{background:#0d0a1a;border:1px solid var(--line);border-radius:10px;padding:12px;margin:8px 0;overflow-x:auto;font-size:12px;line-height:1.4;position:relative}
.msg pre .lang{position:absolute;top:6px;right:8px;font-size:9px;color:var(--muted);font-weight:800;text-transform:uppercase}
.msg pre .copy{position:absolute;top:4px;right:4px;padding:3px 8px;border-radius:5px;font-size:10px;background:var(--bg3);color:var(--ink2);cursor:pointer;border:none;font-weight:700;opacity:0;transition:opacity .2s}
.msg pre:hover .copy{opacity:1}
.msg a{color:var(--sky)}
.msg blockquote{border-left:3px solid var(--grape);padding-left:10px;color:var(--ink2);margin:6px 0}
.msg .img-attach{max-width:200px;border-radius:10px;margin:6px 0;cursor:pointer}
.typing{align-self:flex-start;padding:8px 14px;background:var(--card);border-radius:14px;font-size:12px;color:var(--muted);display:flex;gap:3px}
.typing span{width:5px;height:5px;border-radius:50%;background:var(--muted);animation:dotBounce 1.4s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes dotBounce{0%,80%,100%{opacity:.3;transform:translateY(0)}40%{opacity:1;transform:translateY(-4px)}}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.chat-bar{display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--line);background:var(--bg2);flex-shrink:0;align-items:flex-end}
.chat-bar textarea{flex:1;padding:9px 12px;border-radius:10px;border:1px solid var(--line);background:var(--bg);color:var(--ink);font-size:13.5px;outline:none;font-family:inherit;resize:none;min-height:40px;max-height:120px;line-height:1.4}
.chat-bar textarea:focus{border-color:var(--grape)}
.chat-bar .send-btn{padding:9px 16px;border-radius:10px;background:var(--grape);color:#fff;font-weight:800;font-size:13px;border:none;cursor:pointer;flex-shrink:0}
.chat-bar .attach-btn{padding:7px 10px;border-radius:10px;background:var(--bg3);color:var(--ink2);font-size:18px;border:none;cursor:pointer;flex-shrink:0}
.quick-acts{display:flex;gap:6px;flex-wrap:wrap;padding:8px 12px;border-top:1px solid var(--line);background:var(--bg2);flex-shrink:0}
.quick-acts button{padding:5px 10px;border-radius:7px;font-size:10.5px;font-weight:700;border:1px solid var(--line);background:var(--bg3);color:var(--ink2);cursor:pointer;white-space:nowrap}
.quick-acts button:hover{background:var(--grape);color:#fff;border-color:var(--grape)}
.modal-over{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.7);display:grid;place-items:center;padding:16px;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg2);border:1px solid var(--line);border-radius:16px;padding:20px;width:100%;max-width:420px;max-height:88vh;overflow-y:auto}
.modal h3{font-weight:900;margin-bottom:12px;display:flex;align-items:center;gap:8px;font-size:16px}
.modal h3 .close{margin-left:auto;cursor:pointer;font-size:18px;color:var(--muted)}
.modal label{display:block;font-size:10.5px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:10px 0 4px}
.modal input,.modal select,.modal textarea{width:100%;padding:10px 12px;border-radius:9px;border:1px solid var(--line);background:var(--bg);color:var(--ink);font-size:13.5px;font-family:inherit;outline:none}
.modal input:focus,.modal select:focus,.modal textarea:focus{border-color:var(--grape)}
.modal textarea{resize:vertical;min-height:70px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--bg);padding:10px 22px;border-radius:12px;font-weight:800;font-size:13px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;box-shadow:0 8px 30px rgba(0,0,0,.4)}
.toast.show{opacity:1}
.img-preview{max-width:120px;max-height:80px;border-radius:8px;margin:4px 0;border:1px solid var(--line)}
input[type=file]{display:none}
@media(max-width:400px){.btn{font-size:11px;padding:6px 10px}.msg{max-width:92%}}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>
<input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFile(event)">
<script>
// ============ MyAI Office v2 — Production-Ready ============
const $=id=>document.getElementById(id);
const S='myaioffice_v2';
let state={
  agents:[], settings:{apiKey:'',lang:'en',model:'gemini-2.0-flash'},
  view:'office', chatId:null,
  paperBalance:10000, paperTrades:[], tradeId:0
};
let prices={}, priceTimer=null;
let L='en', _toastTimer=null;

function save(){try{localStorage.setItem(S,JSON.stringify(state))}catch(e){}}
function load(){try{const s=localStorage.getItem(S);if(s)state=JSON.parse(s)}catch(e){}}
const esc=s=>String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c]);
const jesc=s=>String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
const uid=()=>'a'+Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const T=(en,th)=>L==='th'?th:en;

function toast(m,d=2500){
  const t=$('toast');t.textContent=m;t.classList.add('show');
  clearTimeout(_toastTimer);_toastTimer=setTimeout(()=>t.classList.remove('show'),d);
}

// ====== ROLES ======
const R={
  Developer:{icon:'💻',color:'#38bdf8',en:'Developer',th:'นักพัฒนา',descEn:'Writes code, debugs, builds apps & APIs',descTh:'เขียนโค้ด แก้บั๊ค สร้างแอพและ API',
    quickEn:['Write a Python script to...','Debug this code:','Build a REST API for...','Create a React component...'],
    quickTh:['เขียน Python script สำหรับ...','แก้บั๊คโค้ดนี้:','สร้าง REST API สำหรับ...','สร้าง React component...']},
  Content:{icon:'🎬',color:'#ff7eb6',en:'Content Creator',th:'ครีเอเตอร์',descEn:'Creates videos, posts, reels, captions',descTh:'ทำวิดีโอ โพสต์ Reels แคปชั่น',
    quickEn:['Write a TikTok script about...','Draft 5 social media posts...','Create a YouTube video outline...','Write engaging captions for...'],
    quickTh:['เขียนสคริปต์ TikTok...','ร่างโพสต์โซเชียล 5 อัน...','ทำโครงวิดีโอ YouTube...','เขียนแคปชั่นสำหรับ...']},
  Trader:{icon:'📈',color:'#22c97a',en:'Trader',th:'นักเทรด',descEn:'Analyzes markets, tracks PnL, trading signals',descTh:'วิเคราะห์ตลาด ติดตามพอร์ต สัญญาณเทรด',
    quickEn:['Analyze BTC/USD trend...','Calculate risk/reward for...','Review my portfolio...','What are key levels for...'],
    quickTh:['วิเคราะห์แนวโน้ม BTC...','คำนวณ risk/reward...','รีวิวพอร์ตโฟลิโอ...','แนวรับแนวต้านของ...']},
  Designer:{icon:'🎨',color:'#ffb43c',en:'Designer',th:'ดีไซเนอร์',descEn:'Graphics, logos, thumbnails, branding',descTh:'กราฟิก โลโก้ ธัมบ์เนล แบรนด์ดิ้ง',
    quickEn:['Design a logo concept for...','Suggest a color palette for...','Create thumbnail ideas for...','Brand identity for...'],
    quickTh:['ออกแบบโลโก้สำหรับ...','แนะนำชุดสีสำหรับ...','ไอเดียธัมบ์เนล...','สร้างแบรนด์ identity...']},
  Research:{icon:'🔍',color:'#7c5cff',en:'Researcher',th:'นักวิจัย',descEn:'Summarizes, analyzes data, writes reports',descTh:'สรุป วิเคราะห์ข้อมูล เขียนรายงาน',
    quickEn:['Research the market for...','Summarize this topic:','Compare X vs Y...','Find latest trends in...'],
    quickTh:['วิจัยตลาดสำหรับ...','สรุปหัวข้อนี้:','เปรียบเทียบ X กับ Y...','หาเทรนด์ล่าสุดเกี่ยวกับ...']},
  Admin:{icon:'📋',color:'#a78bfa',en:'Admin',th:'แอดมิน',descEn:'Customer replies, schedules, documentation',descTh:'ตอบลูกค้า จัดตาราง ทำเอกสาร',
    quickEn:['Draft an email response to...','Create a schedule for...','Write documentation for...','Customer FAQ for...'],
    quickTh:['ร่างอีเมลตอบกลับ...','สร้างตารางงานสำหรับ...','เขียนเอกสารสำหรับ...','FAQ ลูกค้าสำหรับ...']}
};
const RNAMES=Object.keys(R);

// ====== GEMINI API ======
async function callGemini(prompt,hist,imgData){
  const key=state.settings.apiKey;
  if(!key)return{error:'No API key — open ⚙️ Settings'};
  const model=state.settings.model||'gemini-2.0-flash';
  const parts=[{text:prompt}];
  if(imgData)parts.push({inline_data:{mime_type:imgData.mime||'image/png',data:imgData.data}});
  try{
    const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({contents:[...hist.map(h=>({role:h.role==='user'?'user':'model',parts:[{text:h.text}]})),{role:'user',parts}],generationConfig:{temperature:0.7,maxOutputTokens:4096}})
    });
    const d=await res.json();
    if(d.error)return{error:d.error.message||'API error'};
    return{text:d.candidates?.[0]?.content?.parts?.[0]?.text||'(empty response)'};
  }catch(e){return{error:'Network error — check connection'};}
}


// ====== COINGECKO PRICE FEED ======
const COINS=['bitcoin','ethereum','solana','ripple','cardano','dogecoin','avalanche-2','polkadot'];
const COIN_MAP={bitcoin:'BTC',ethereum:'ETH',solana:'SOL',ripple:'XRP',cardano:'ADA',dogecoin:'DOGE','avalanche-2':'AVAX',polkadot:'DOT'};

async function fetchPrices(){
  try{
    const r=await fetch('https://api.coingecko.com/api/v3/simple/price?ids='+COINS.join(',')+'&vs_currencies=usd&include_24hr_change=true');
    const d=await r.json();
    for(const[id,data]of Object.entries(d)){
      const sym=COIN_MAP[id]||id.toUpperCase();
      prices[sym]={usd:data.usd,chg:data.usd_24h_change||0};
    }
  }catch(e){}
}

function priceBar(){
  const th=L==='th';
  let h='<div class="price-bar" id="priceBar">';
  const syms=Object.keys(prices);
  if(!syms.length)return h+'<span style="color:var(--muted);font-size:11px;padding:8px">'+T('Loading prices...','กำลังโหลดราคา...')+'</span></div>';
  for(const sym of syms){
    const p=prices[sym];const cls=p.chg>=0?'up':'down';
    h+=`<div class="price-chip" onclick="quickTrade('${sym}')"><span class="sym">${sym}</span> <span class="val">$${p.usd<1?p.usd.toFixed(4):p.usd<10?p.usd.toFixed(2):p.usd.toLocaleString()}</span> <span class="price-chg ${cls}">${p.chg>=0?'+':''}${p.chg.toFixed(1)}%</span></div>`;
  }
  h+='</div>';
  return h;
}

// ====== PAPER TRADING ======
function quickTrade(sym){state.view='trade';render();setTimeout(()=>{
  const s=$('tradeSym');if(s){s.value=sym;s.dispatchEvent(new Event('change'));}
},100);}

function openPaperTrade(sym,side,size){
  const p=prices[sym];if(!p)return toast(T('Price unavailable','ราคาไม่พร้อม'));
  const cost=size*p.usd;
  if(cost>state.paperBalance)return toast(T('Not enough balance','เงินไม่พอ'));
  state.paperBalance-=cost;
  const id=++state.tradeId;
  state.paperTrades.push({id,sym,side,size,entry:p.usd,openAt:Date.now(),closed:false,closePrice:null,pnl:null});
  save();render();toast(`${side.toUpperCase()} ${size} ${sym} @ $${p.usd.toLocaleString()}`);
}

function closePaperTrade(id){
  const t=state.paperTrades.find(x=>x.id===id);if(!t||t.closed)return;
  const p=prices[t.sym];if(!p)return toast('Price unavailable');
  const pnl=t.side==='long'?(p.usd-t.entry)*t.size:(t.entry-p.usd)*t.size;
  t.closed=true;t.closePrice=p.usd;t.pnl=Math.round(pnl*100)/100;t.closedAt=Date.now();
  state.paperBalance+=t.size*t.entry+pnl;
  save();render();toast(`Closed ${t.sym}: ${pnl>=0?'+':''}$${Math.abs(t.pnl).toLocaleString()}`);
}

function totalPnL(){
  let pnl=0;
  for(const t of state.paperTrades)if(t.pnl!=null)pnl+=t.pnl;
  return pnl;
}

// ====== UPGRADED TRADER PROMPT ======
function traderPrompt(a){
  const r=R[a.role];
  let priceInfo='';
  const syms=Object.keys(prices);
  if(syms.length){
    priceInfo='\n\nCurrent market prices (live):\n'+syms.map(s=>{
      const p=prices[s];return `${s}: $${p.usd} (24h: ${p.chg>=0?'+':''}${p.chg.toFixed(1)}%)`;
    }).join('\n');
  }
  const openPositions=state.paperTrades.filter(t=>!t.closed);
  let posInfo='';
  if(openPositions.length){
    posInfo='\n\nYour open paper positions:\n'+openPositions.map(t=>{
      const cur=prices[t.sym]?.usd||t.entry;
      const upnl=t.side==='long'?(cur-t.entry)*t.size:(t.entry-cur)*t.size;
      return `${t.side.toUpperCase()} ${t.size} ${t.sym} @ $${t.entry} | Current: $${cur} | Unrealized: $${Math.round(upnl*100)/100}`;
    }).join('\n');
  }
  return `You are "${a.name}", an AI Trader at MyAI Office.
Specialty: Market analysis, trading signals, portfolio tracking
${a.memory?`\nOwner context: ${a.memory}\n`:''}
${priceInfo}${posInfo}
Paper trading balance: $${state.paperBalance.toLocaleString()}

Rules:
- Respond in ${L==='th'?'Thai':'English'} unless asked otherwise
- Use the live prices above for analysis
- Be specific about entry/exit levels when asked
- For crypto: mention support/resistance, trend direction, volume context
- Keep analysis concise and actionable
- Never give financial advice — always add disclaimer`;
}

// ====== MARKDOWN RENDERER ======
function md2html(t){
  if(!t)return'';
  let h=esc(t);
  // Code blocks with language
  h=h.replace(/```(\w*)\n?([\s\S]*?)```/g,(_,lang,code)=>
    '<pre><span class="lang">'+esc(lang||'')+'</span><button class="copy" onclick="copyCode(this)">Copy</button>'+esc(code.trimEnd())+'</pre>');
  // Inline code
  h=h.replace(/`([^`]+)`/g,'<code>$1</code>');
  // Bold, italic
  h=h.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
  h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  h=h.replace(/\*(.+?)\*/g,'<em>$1</em>');
  // Headers
  h=h.replace(/^### (.+)$/gm,'<strong>$1</strong>');
  h=h.replace(/^## (.+)$/gm,'<strong style="font-size:1.1em">$1</strong>');
  h=h.replace(/^# (.+)$/gm,'<strong style="font-size:1.2em">$1</strong>');
  // Lists
  h=h.replace(/^- (.+)$/gm,'<li>$1</li>');
  h=h.replace(/((?:<li>.*<\/li>\n?)+)/g,'<ul>$1</ul>');
  h=h.replace(/^\d+\. (.+)$/gm,'<li>$1</li>');
  h=h.replace(/<li>/g,'\n<li>'); // re-split for numbered lists
  // Blockquote
  h=h.replace(/^&gt; (.+)$/gm,'<blockquote>$1</blockquote>');
  // Links
  h=h.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');
  // Line breaks
  h=h.replace(/\n\n/g,'</p><p>');
  h=h.replace(/\n/g,'<br>');
  h='<p>'+h+'</p>';
  h=h.replace(/<p>\s*<\/p>/g,'');
  return h;
}

function copyCode(btn){
  const code=btn.parentElement.textContent.replace('Copy','').trim();
  navigator.clipboard.writeText(code).then(()=>{
    btn.textContent='Copied!';setTimeout(()=>btn.textContent='Copy',1500);
  }).catch(()=>toast(T('Copy failed','คัดลอกไม่สำเร็จ')));
}

// ====== AGENT SYSTEM PROMPT ======
function sysPrompt(a){if(a.role==='Trader')return traderPrompt(a);
  const r=R[a.role];
  return `You are "${a.name}", an AI ${r.en} at MyAI Office.
Specialty: ${r.descEn}
${a.memory?`\nAdditional context/memory from owner:\n${a.memory}\n`:''}
Rules:
- Respond in ${L==='th'?'Thai':'English'} unless asked otherwise
- For code: ALWAYS use markdown code blocks with language (e.g. \`\`\`python)
- For content: write publish-ready, complete copy
- Be concise, professional, and actionable
- Use markdown for formatting when helpful`;
}

// ====== RENDERING ======
function render(){
  if(state.view==='chat'&&state.chatId)return renderChat();
  renderOffice();
}

function renderOffice(){
  const app=$('app');L=state.settings.lang||'en';const th=L==='th';
  const ags=state.agents;
  app.innerHTML=`

async function sendMsg(){
  const inp=$('chatInput');if(!inp)return;
  const text=inp.value.trim();if(!text&&!window._pendingImg)return;
  const a=state.agents.find(x=>x.id===state.chatId);if(!a)return;
  inp.value='';inp.style.height='40px';

  const imgData=window._pendingImg||null;
  window._pendingImg=null;
  const imgPrev=$('imgPrev');if(imgPrev)imgPrev.style.display='none';

  a.chat.push({role:'user',text:text||'[image]',image:imgData?.dataUrl||null});
  a.status='work';save();render();

  const ti=$('typing');if(ti)ti.style.display='flex';scrollMsgs();

  const hist=[{role:'system',text:sysPrompt(a)},...a.chat.slice(0,-1).filter(m=>m.role!=='system')];
  const prompt=[sysPrompt(a),...a.chat.slice(0,-1).map(m=>m.role==='user'?`User: ${m.text}`:`Assistant: ${m.text}`)].join('\n');
  const finalPrompt=text||'Describe this image in detail. What do you see?';

  const result=await callGemini(finalPrompt,hist.filter(m=>m.role!=='system').map(m=>({role:m.role,text:m.text})),imgData?{mime:imgData.mime,data:imgData.base64}:null);

  if(ti)ti.style.display='none';
  if(result.error){
    a.chat.push({role:'agent',text:'⚠️ '+result.error});
  }else{
    a.chat.push({role:'agent',text:result.text});
    a.status='idle';
  }
  save();render();scrollMsgs();
}

function quickTask(q){
  const inp=$('chatInput');if(inp){inp.value=q;inp.focus();}
}

// ====== FILE UPLOAD ======
function handleFile(e){
  const file=e.target.files[0];if(!file)return;
  if(!file.type.startsWith('image/')){toast(T('Images only','รูปภาพเท่านั้น'));return;}
  const reader=new FileReader();
  reader.onload=ev=>{
    const dataUrl=ev.target.result;
    const base64=dataUrl.split(',')[1];
    const mime=file.type;
    window._pendingImg={dataUrl,base64,mime};
    const prev=$('imgPrev');
    if(prev){prev.style.display='block';prev.innerHTML=`<img src="${dataUrl}" class="img-preview"><button class="btn sm red" style="margin-left:6px" onclick="window._pendingImg=null;$('imgPrev').style.display='none'">✕</button>`;}
  };
  reader.readAsDataURL(file);
  e.target.value='';
}

function doTrade(){
  const sym=$('tradeSym')?.value;

  openPaperTrade(sym,side,size);
}

function initPriceTimer(){
  if(priceTimer)return;
  fetchPrices().then(()=>{if(state.view==='trade')render();});
  priceTimer=setInterval(async()=>{
    await fetchPrices();
    if(state.view==='trade'){
      const bar=$('priceBar');
      if(bar)bar.outerHTML=priceBar();
    }
  },15000);
}

  toast(T('Saved ✓','บันทึกแล้ว ✓'));render();

function exportChat(id){
  const a=state.agents.find(x=>x.id===id);if(!a)return;
  let txt=`# Chat with ${a.name} (${a.role})\n# MyAI Office — ${new Date().toISOString().slice(0,10)}\n\n`;
  for(const m of a.chat)txt+=`## ${m.role==='user'?'You':a.name}\n${m.text}\n\n`;
  const blob=new Blob([txt],{type:'text/markdown'});
  const url=URL.createObjectURL(blob);
  const dl=document.createElement('a');dl.href=url;dl.download=`${a.name.replace(/\s/g,'_')}_chat.md`;dl.click();
  URL.revokeObjectURL(url);toast(T('Exported!','ส่งออกแล้ว!'));
}

  const a=state.agents.find(x=>x.id===id);if(!a)return;

  a.chat=[];a.status='idle';save();
