<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>MyAI Office — 3D AI Team</title>
<meta name="description" content="Hire AI agents, assign roles, and get real work done — in 3D.">
<meta name="theme-color" content="#6c5ce7">
<style>
:root{
  --bg:#1a1a2e;--bg2:#16213e;--bg3:#0f3460;--card:#1a1a2e;--cardHover:#1f2b47;
  --ink:#f5f0ff;--ink2:#c4b5e3;--muted:#8b7aaa;--line:#2a2560;
  --grape:#6c5ce7;--coral:#fd79a8;--leaf:#00cec9;--gold:#fdcb6e;--pink:#fd79a8;--sky:#74b9ff;
  --warm:#ffeaa7;--rose:#fab1a0;--mint:#55efc4;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;color:var(--ink);background:var(--bg);overflow:hidden;touch-action:pan-x pan-y pinch-zoom}

#gl{position:fixed;inset:0;z-index:1}
#gl canvas{display:block}

#labels{position:fixed;inset:0;z-index:2;pointer-events:none}
.alabel{position:absolute;transform:translate(-50%,-50%);text-align:center;pointer-events:auto;cursor:pointer;transition:opacity .3s}
.alabel .al-dot{width:14px;height:14px;border-radius:50%;margin:0 auto 5px;border:2.5px solid rgba(255,255,255,.5);transition:all .3s;backdrop-filter:blur(2px)}
.alabel .al-dot.idle{box-shadow:0 0 12px currentColor,0 0 24px currentColor}
.alabel .al-dot.work{animation:pulse .7s infinite}
.alabel .al-name{font-weight:800;font-size:13px;text-shadow:0 2px 8px rgba(0,0,0,.6),0 0 20px rgba(0,0,0,.4);line-height:1.2;letter-spacing:.02em}
.alabel .al-role{font-size:9px;opacity:.8;text-transform:uppercase;letter-spacing:.08em;text-shadow:0 1px 4px rgba(0,0,0,.5)}
.alabel .al-status{font-size:9px;opacity:.9;margin-top:2px;font-weight:600}
.alabel:hover{transform:translate(-50%,-50%) scale(1.1)}
.alabel:hover .al-name{color:#fff!important}
@keyframes pulse{0%,100%{box-shadow:0 0 8px currentColor,0 0 16px currentColor;transform:scale(1)}50%{box-shadow:0 0 20px currentColor,0 0 40px currentColor;transform:scale(1.2)}}

#hud{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:8px;padding:10px 16px;background:rgba(22,33,62,.85);backdrop-filter:blur(20px);border:1px solid rgba(108,92,231,.3);border-radius:20px;box-shadow:0 8px 32px rgba(0,0,0,.4)}
#hud button{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border-radius:14px;font-weight:700;font-size:13px;cursor:pointer;border:none;font-family:inherit;white-space:nowrap;transition:all .2s;background:rgba(255,255,255,.08);color:var(--ink);letter-spacing:.02em}
#hud button:hover{background:rgba(108,92,231,.4);transform:translateY(-2px);box-shadow:0 4px 16px rgba(108,92,231,.3)}
#hud button.pri{background:var(--grape);color:#fff;box-shadow:0 4px 16px rgba(108,92,231,.4)}
#hud button.pri:hover{box-shadow:0 6px 24px rgba(108,92,231,.5)}
#hud .badge{font-size:10px;padding:2px 7px;border-radius:8px;background:var(--pink);color:#fff;margin-left:3px}

#panel{position:fixed;inset:0;z-index:20;pointer-events:none;display:flex;flex-direction:column}
#panel.active{pointer-events:auto}
#panel .p-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.35);opacity:0;transition:opacity .3s}
#panel.active .p-backdrop{opacity:1}
#panel .p-sheet{position:absolute;bottom:0;left:0;right:0;max-height:82vh;background:rgba(22,33,62,.97);backdrop-filter:blur(24px);border-top:1px solid rgba(108,92,231,.2);border-radius:22px 22px 0 0;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .4s cubic-bezier(.4,0,.2,1);box-shadow:0 -8px 40px rgba(0,0,0,.5)}
#panel.active .p-sheet{transform:translateY(0)}
#panel .p-head{display:flex;align-items:center;gap:10px;padding:16px 18px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0}
#panel .p-head .p-title{font-weight:800;font-size:15px;flex:1;min-width:0;letter-spacing:.02em}
#panel .p-head .p-close{font-size:22px;cursor:pointer;color:var(--muted);padding:4px 8px;border-radius:10px;transition:all .2s}
#panel .p-head .p-close:hover{background:rgba(255,255,255,.08);color:var(--coral)}
#panel .p-body{flex:1;overflow-y:auto;padding:14px}

#welcome{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;pointer-events:none}
#welcome .w-card{background:rgba(22,33,62,.92);backdrop-filter:blur(20px);border:1px solid rgba(108,92,231,.2);border-radius:24px;padding:36px 28px;text-align:center;max-width:350px;pointer-events:auto;box-shadow:0 16px 48px rgba(0,0,0,.5)}
#welcome .w-icon{font-size:60px;margin-bottom:14px;animation:float 3s ease-in-out infinite}
#welcome h2{font-weight:900;margin-bottom:8px;font-size:21px;letter-spacing:.02em}
#welcome p{font-size:13.5px;color:var(--muted);margin-bottom:18px;line-height:1.6}
#welcome.hidden{display:none}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

.msg{max-width:88%;padding:10px 16px;border-radius:18px;font-size:13.5px;line-height:1.55;animation:msgIn .25s ease;margin-bottom:6px}
.msg.user{align-self:flex-end;background:var(--grape);color:#fff;border-bottom-right-radius:6px}
.msg.ai{align-self:flex-start;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-bottom-left-radius:6px}
.msg.ai .sender{font-size:10px;font-weight:800;color:var(--muted);margin-bottom:4px}
.msg p{margin:4px 0}
.msg code{background:rgba(0,0,0,.3);padding:2px 7px;border-radius:5px;font-size:12px;font-family:'SF Mono','Cascadia Code',monospace}
.msg pre{background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:14px;margin:8px 0;overflow-x:auto;font-size:12px;line-height:1.5;position:relative}
.msg pre .copy{position:absolute;top:6px;right:6px;padding:4px 10px;border-radius:6px;font-size:10px;background:rgba(255,255,255,.1);color:var(--ink2);cursor:pointer;border:none;font-weight:700;opacity:0;transition:opacity .2s}
.msg pre:hover .copy{opacity:1}
.msg blockquote{border-left:3px solid var(--grape);padding-left:12px;color:var(--ink2);margin:6px 0}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.typing{padding:8px 16px;background:rgba(255,255,255,.04);border-radius:16px;font-size:12px;color:var(--muted);display:flex;gap:4px;align-self:flex-start}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:dotBounce 1.4s infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes dotBounce{0%,80%,100%{opacity:.3;transform:translateY(0)}40%{opacity:1;transform:translateY(-5px)}}

.chat-wrap{display:flex;flex-direction:column;height:100%}
.chat-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:4px}
.chat-bar{display:flex;gap:8px;padding:12px 14px;border-top:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.2);flex-shrink:0;align-items:flex-end}
.chat-bar textarea{flex:1;padding:10px 14px;border-radius:14px;border:1px solid rgba(255,255,255,.1);background:rgba(0,0,0,.3);color:var(--ink);font-size:13.5px;outline:none;font-family:inherit;resize:none;min-height:42px;max-height:120px;line-height:1.5}
.chat-bar textarea:focus{border-color:var(--grape)}
.chat-bar .send-btn{padding:10px 18px;border-radius:14px;background:var(--grape);color:#fff;font-weight:800;font-size:13px;border:none;cursor:pointer;transition:all .2s}
.chat-bar .send-btn:hover{filter:brightness(1.1);transform:scale(1.02)}
.quick-acts{display:flex;gap:5px;flex-wrap:wrap;padding:10px 14px;border-top:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.1);flex-shrink:0}
.quick-acts button{padding:6px 10px;border-radius:8px;font-size:10.5px;font-weight:700;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:var(--ink2);cursor:pointer;white-space:nowrap;transition:all .15s}
.quick-acts button:hover{background:var(--grape);color:#fff;border-color:var(--grape)}

.price-bar{display:flex;gap:6px;padding:10px 14px;overflow-x:auto;-webkit-overflow-scrolling:touch;flex-shrink:0;background:rgba(0,0,0,.2);border-bottom:1px solid rgba(255,255,255,.04)}
.price-chip{flex-shrink:0;padding:6px 12px;border-radius:10px;font-size:11px;font-weight:700;cursor:pointer;background:rgba(255,255,255,.04);white-space:nowrap;transition:all .15s}
.price-chip:hover{background:rgba(108,92,231,.2)}
.price-chip .sym{color:var(--ink);margin-right:5px}
.price-chip .val{color:var(--ink2)}
.price-chip .chg{font-size:10px;margin-left:5px}
.price-chip .chg.up{color:var(--mint)}.price-chip .chg.down{color:var(--coral)}
.balance-bar{display:flex;align-items:center;gap:12px;padding:12px 16px;font-size:12px;background:rgba(0,0,0,.3);border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;flex-wrap:wrap}
.trade-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:14px;margin-bottom:8px;transition:all .2s}
.trade-card:hover{border-color:rgba(108,92,231,.3)}
.trade-card .t-head{display:flex;align-items:center;gap:8px;font-weight:800;font-size:13px}
.trade-card .t-side{padding:3px 10px;border-radius:6px;font-size:10px;font-weight:900;text-transform:uppercase}
.trade-card .t-side.long{background:rgba(0,206,201,.15);color:var(--mint)}
.trade-card .t-side.short{background:rgba(253,121,168,.15);color:var(--coral)}
.trade-card .t-pnl{font-weight:900;font-size:15px;margin-top:6px}
.trade-card .t-meta{font-size:10px;color:var(--muted);margin-top:4px}
.trade-form{display:flex;gap:6px;padding:12px 14px;border-top:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.2);flex-shrink:0;align-items:center;flex-wrap:wrap}
.trade-form select,.trade-form input{padding:8px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(0,0,0,.3);color:var(--ink);font-size:12px;font-family:inherit}
.trade-form select:focus,.trade-form input:focus{border-color:var(--grape);outline:none}

.modal-over{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.6);display:grid;place-items:center;padding:16px;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg2);border:1px solid rgba(108,92,231,.2);border-radius:20px;padding:22px;width:100%;max-width:420px;max-height:88vh;overflow-y:auto;box-shadow:0 16px 48px rgba(0,0,0,.5)}
.modal h3{font-weight:900;margin-bottom:14px;display:flex;align-items:center;gap:8px;font-size:17px}
.modal h3 .close{margin-left:auto;cursor:pointer;font-size:20px;color:var(--muted);padding:4px 8px;border-radius:8px;transition:all .2s}
.modal h3 .close:hover{background:rgba(255,255,255,.08);color:var(--coral)}
.modal label{display:block;font-size:10.5px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:12px 0 4px}
.modal input,.modal select,.modal textarea{width:100%;padding:11px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(0,0,0,.3);color:var(--ink);font-size:13.5px;font-family:inherit;outline:none}
.modal input:focus,.modal select:focus,.modal textarea:focus{border-color:var(--grape)}
.modal textarea{resize:vertical;min-height:70px}
.toast{position:fixed;bottom:110px;left:50%;transform:translateX(-50%);background:var(--grape);color:#fff;padding:10px 24px;border-radius:14px;font-weight:800;font-size:13px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;box-shadow:0 8px 32px rgba(108,92,231,.4)}
.toast.show{opacity:1}
input[type=file]{display:none}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:10px;font-weight:700;font-size:12.5px;cursor:pointer;border:none;background:rgba(255,255,255,.08);color:var(--ink);transition:all .15s;font-family:inherit;white-space:nowrap}
.btn:hover{filter:brightness(1.2)}
.btn.pri{background:var(--grape);color:#fff}
.btn.red{background:var(--coral);color:#fff}
.btn.sm{padding:5px 10px;font-size:11px}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty h2{font-weight:900;margin-bottom:6px;color:var(--ink)}
.empty p{font-size:13px;margin-bottom:14px;line-height:1.4}
.img-preview{max-width:120px;max-height:80px;border-radius:8px;margin:4px 0;border:1px solid rgba(255,255,255,.1)}
@media(max-width:400px){#hud{padding:8px 12px;gap:4px;border-radius:16px}#hud button{padding:8px 12px;font-size:11px;border-radius:10px}}
</style>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
</head>
<body>
<div id="gl"></div>
<div id="labels"></div>
<div id="welcome"><div class="w-card"><div class="w-icon">🏢</div><h2 id="wTitle">สร้างทีม AI ของคุณ</h2><p id="wDesc">จ้างเอเจนต์ AI มาทำงานให้คุณ — เห็นพวกเขานั่งทำงานในออฟฟิศ 3D แบบ real-time</p><button class="btn pri" onclick="showHire()" style="font-size:14px;padding:12px 24px;border-radius:14px">✨ จ้างเอเจนต์คนแรก</button></div></div>
<div id="hud">
  <button onclick="showHire()">✨ <span id="hudHire">จ้าง</span></button>
  <button onclick="toggleTrade()">📈 <span id="hudTrade">เทรด</span></button>
  <button onclick="showSettings()">⚙️</button>
</div>
<div id="panel"><div class="p-backdrop" onclick="closePanel()"></div><div class="p-sheet"><div id="panelContent"></div></div></div>
<div id="toast" class="toast"></div>
<input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFile(event)">
<script>
// ============ MyAI Office v7 — Cute 3D Office ============
const $=id=>document.getElementById(id);
const S='myaioffice_v7';
let state={
  agents:[], settings:{apiKey:'',lang:'th',model:'deepseek-v4-pro',provider:'proxy',proxyUrl:'https://das-beads-told-circumstances.trycloudflare.com'},
  view:'office', chatId:null, panelMode:null,
  paperBalance:10000, paperTrades:[], tradeId:0
};
const DEMO_AGENTS=[
  {id:'demo_dev',role:'Developer',name:'Mint',memory:'ตอบเป็นภาษาไทย เขียนโค้ดสวย',chat:[],status:'idle',createdAt:Date.now()-86400000},
  {id:'demo_trader',role:'Trader',name:'Boss',memory:'วิเคราะห์เด่น BTC ETH SOL',chat:[],status:'idle',createdAt:Date.now()-86400000}
];
let prices={}, priceTimer=null, L='en', _toastTimer=null;

function save(){try{localStorage.setItem(S,JSON.stringify(state))}catch(e){}}
function load(){try{const s=localStorage.getItem(S);if(s)state=JSON.parse(s)}catch(e){}}
const esc=s=>String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c]);
const jesc=s=>String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
const uid=()=>'a'+Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const T=(en,th)=>L==='th'?th:en;
function toast(m,d=2500){const t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(_toastTimer);_toastTimer=setTimeout(()=>t.classList.remove('show'),d);}

const R={
  Developer:{icon:'💻',color:'#74b9ff',en:'Developer',th:'นักพัฒนา',descEn:'Writes code, debugs, builds apps & APIs',descTh:'เขียนโค้ด แก้บั๊ค สร้างแอพและ API',
    quickEn:['Write a Python script to...','Debug this code:','Build a REST API for...','Create a React component...'],
    quickTh:['เขียน Python script สำหรับ...','แก้บั๊คโค้ดนี้:','สร้าง REST API สำหรับ...','สร้าง React component...']},
  Content:{icon:'🎬',color:'#fd79a8',en:'Content Creator',th:'ครีเอเตอร์',descEn:'Creates videos, posts, reels, captions',descTh:'ทำวิดีโอ โพสต์ Reels แคปชั่น',
    quickEn:['Write a TikTok script about...','Draft 5 social media posts...','Create a YouTube video outline...','Write engaging captions for...'],
    quickTh:['เขียนสคริปต์ TikTok...','ร่างโพสต์โซเชียล 5 อัน...','ทำโครงวิดีโอ YouTube...','เขียนแคปชั่นสำหรับ...']},
  Trader:{icon:'📈',color:'#00cec9',en:'Trader',th:'นักเทรด',descEn:'Analyzes markets, tracks PnL, trading signals',descTh:'วิเคราะห์ตลาด ติดตามพอร์ต สัญญาณเทรด',
    quickEn:['Analyze BTC/USD trend...','Calculate risk/reward for...','Review my portfolio...','What are key levels for...'],
    quickTh:['วิเคราะห์แนวโน้ม BTC...','คำนวณ risk/reward...','รีวิวพอร์ตโฟลิโอ...','แนวรับแนวต้านของ...']},
  Designer:{icon:'🎨',color:'#fdcb6e',en:'Designer',th:'ดีไซเนอร์',descEn:'Graphics, logos, thumbnails, branding',descTh:'กราฟิก โลโก้ ธัมบ์เนล แบรนด์ดิ้ง',
    quickEn:['Design a logo concept for...','Suggest a color palette for...','Create thumbnail ideas for...','Brand identity for...'],
    quickTh:['ออกแบบโลโก้สำหรับ...','แนะนำชุดสีสำหรับ...','ไอเดียธัมบ์เนล...','สร้างแบรนด์ identity...']},
  Research:{icon:'🔍',color:'#6c5ce7',en:'Researcher',th:'นักวิจัย',descEn:'Summarizes, analyzes data, writes reports',descTh:'สรุป วิเคราะห์ข้อมูล เขียนรายงาน',
    quickEn:['Research the market for...','Summarize this topic:','Compare X vs Y...','Find latest trends in...'],
    quickTh:['วิจัยตลาดสำหรับ...','สรุปหัวข้อนี้:','เปรียบเทียบ X กับ Y...','หาเทรนด์ล่าสุดเกี่ยวกับ...']},
  Admin:{icon:'📋',color:'#fab1a0',en:'Admin',th:'แอดมิน',descEn:'Customer replies, schedules, documentation',descTh:'ตอบลูกค้า จัดตาราง ทำเอกสาร',
    quickEn:['Draft an email response to...','Create a schedule for...','Write documentation for...','Customer FAQ for...'],
    quickTh:['ร่างอีเมลตอบกลับ...','สร้างตารางงานสำหรับ...','เขียนเอกสารสำหรับ...','FAQ ลูกค้าสำหรับ...']}
};
const RNAMES=Object.keys(R);

// ====== AI API ======
async function callAI(prompt,hist,imgData){
  const s=state.settings;
  if(s.provider==='opencode')return callOpenCode(prompt,hist);
  if(s.provider==='proxy')return callProxy(prompt,hist,imgData);
  return callGemini(prompt,hist,imgData);
}
async function callOpenCode(prompt,hist){
  const key=state.settings.apiKey;if(!key)return{error:'No API key — open ⚙️ Settings'};
  try{const res=await fetch('https://opencode.ai/zen/go/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify({model:'deepseek-v4-pro',messages:[...hist.filter(m=>m.role!=='system').map(m=>({role:m.role==='user'?'user':'assistant',content:m.text})),{role:'user',content:prompt}],max_tokens:4096,temperature:0.7})});const d=await res.json();if(d.error)return{error:d.error.message||'API error'};let text=d.choices?.[0]?.message?.content||'';if(!text&&d.choices?.[0]?.message?.reasoning_content)text='[คิดแล้ว]\n\n'+d.choices[0].message.reasoning_content.slice(-500);return{text:text||'(empty)'};}catch(e){return{error:'Network error — OpenCode may block browser CORS. Try Proxy mode instead.'};}
}
async function callProxy(prompt,hist,imgData){
  const url=(state.settings.proxyUrl||'http://localhost:8765')+'/api/chat';
  try{const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:state.settings.model||'deepseek-v4-pro',messages:[...hist.filter(m=>m.role!=='system').map(m=>({role:m.role,content:m.text})),{role:'user',content:prompt}],max_tokens:4096})});const d=await res.json();if(d.error)return{error:d.error};return{text:d.choices?.[0]?.message?.content||'(empty)'};}catch(e){return{error:'Proxy not reachable — start the proxy server or use Gemini instead.'};}
}
async function callGemini(prompt,hist,imgData){
  const key=state.settings.apiKey;if(!key)return{error:'No API key — open ⚙️ Settings'};const model=state.settings.model||'gemini-2.0-flash';const parts=[{text:prompt}];if(imgData)parts.push({inline_data:{mime_type:imgData.mime||'image/png',data:imgData.data}});
  try{const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[...hist.map(h=>({role:h.role==='user'?'user':'model',parts:[{text:h.text}]})),{role:'user',parts}],generationConfig:{temperature:0.7,maxOutputTokens:4096}})});const d=await res.json();if(d.error)return{error:d.error.message||'API error'};return{text:d.candidates?.[0]?.content?.parts?.[0]?.text||'(empty response)'};}catch(e){return{error:'Network error — check connection'};}
}

// ====== COINGECKO ======
const COINS=['bitcoin','ethereum','solana','ripple','cardano','dogecoin','avalanche-2','polkadot'];
const COIN_MAP={bitcoin:'BTC',ethereum:'ETH',solana:'SOL',ripple:'XRP',cardano:'ADA',dogecoin:'DOGE','avalanche-2':'AVAX',polkadot:'DOT'};
async function fetchPrices(){try{const r=await fetch('https://api.coingecko.com/api/v3/simple/price?ids='+COINS.join(',')+'&vs_currencies=usd&include_24hr_change=true');const d=await r.json();for(const[id,data]of Object.entries(d)){const sym=COIN_MAP[id]||id.toUpperCase();prices[sym]={usd:data.usd,chg:data.usd_24h_change||0};}}catch(e){}}
function priceBarHTML(){let h='<div class="price-bar" id="priceBar">';const syms=Object.keys(prices);if(!syms.length)return h+'<span style="color:var(--muted);font-size:11px;padding:8px">'+T('Loading prices...','กำลังโหลดราคา...')+'</span></div>';for(const sym of syms){const p=prices[sym];const cls=p.chg>=0?'up':'down';h+=`<div class="price-chip" onclick="quickTrade('${sym}')"><span class="sym">${sym}</span><span class="val">$${p.usd<1?p.usd.toFixed(4):p.usd<10?p.usd.toFixed(2):p.usd.toLocaleString()}</span><span class="chg ${cls}">${p.chg>=0?'+':''}${p.chg.toFixed(1)}%</span></div>`;}h+='</div>';return h;}
function quickTrade(sym){toggleTrade();setTimeout(()=>{const s=$('tradeSym');if(s){s.value=sym;s.dispatchEvent(new Event('change'));}},300);}
function openPaperTrade(sym,side,size){const p=prices[sym];if(!p)return toast(T('Price unavailable','ราคาไม่พร้อม'));const cost=size*p.usd;if(cost>state.paperBalance)return toast(T('Not enough balance','เงินไม่พอ'));state.paperBalance-=cost;const id=++state.tradeId;state.paperTrades.push({id,sym,side,size,entry:p.usd,openAt:Date.now(),closed:false,closePrice:null,pnl:null});save();renderTrade();toast(`${side.toUpperCase()} ${size} ${sym} @ $${p.usd.toLocaleString()}`);}
function closePaperTrade(id){const t=state.paperTrades.find(x=>x.id===id);if(!t||t.closed)return;const p=prices[t.sym];if(!p)return toast('Price unavailable');const pnl=t.side==='long'?(p.usd-t.entry)*t.size:(t.entry-p.usd)*t.size;t.closed=true;t.closePrice=p.usd;t.pnl=Math.round(pnl*100)/100;t.closedAt=Date.now();state.paperBalance+=t.size*t.entry+pnl;save();renderTrade();toast(`Closed ${t.sym}: ${pnl>=0?'+':''}$${Math.abs(t.pnl).toLocaleString()}`);}
function totalPnL(){let pnl=0;for(const t of state.paperTrades)if(t.pnl!=null)pnl+=t.pnl;return pnl;}
function doTrade(){const sym=$('tradeSym')?.value,side=$('tradeSide')?.value,size=parseFloat($('tradeSize')?.value);if(!sym||!side||!(size>0))return toast(T('Fill all fields','กรอกให้ครบ'));openPaperTrade(sym,side,size);}

// ====== MARKDOWN ======
function md2html(t){if(!t)return'';let h=esc(t);h=h.replace(/```(\w*)\n?([\s\S]*?)```/g,(_,lang,code)=>'<pre><span class="lang" style="position:absolute;top:6px;right:36px;font-size:9px;color:var(--muted);font-weight:800;text-transform:uppercase">'+esc(lang||'')+'</span><button class="copy" onclick="copyCode(this)">Copy</button>'+esc(code.trimEnd())+'</pre>');h=h.replace(/`([^`]+)`/g,'<code>$1</code>');h=h.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');h=h.replace(/\*(.+?)\*/g,'<em>$1</em>');h=h.replace(/^### (.+)$/gm,'<strong>$1</strong>');h=h.replace(/^## (.+)$/gm,'<strong style="font-size:1.1em">$1</strong>');h=h.replace(/^# (.+)$/gm,'<strong style="font-size:1.2em">$1</strong>');h=h.replace(/^- (.+)$/gm,'<li>$1</li>');h=h.replace(/((?:<li>.*<\/li>\n?)+)/g,'<ul>$1</ul>');h=h.replace(/^\d+\. (.+)$/gm,'<li>$1</li>');h=h.replace(/^&gt; (.+)$/gm,'<blockquote>$1</blockquote>');h=h.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');h=h.replace(/\n\n/g,'</p><p>');h=h.replace(/\n/g,'<br>');h='<p>'+h+'</p>';h=h.replace(/<p>\s*<\/p>/g,'');return h;}
function copyCode(btn){const code=btn.parentElement.textContent.replace('Copy','').trim();navigator.clipboard.writeText(code).then(()=>{btn.textContent='Copied!';setTimeout(()=>btn.textContent='Copy',1500);}).catch(()=>toast('Copy failed'));}

function traderPrompt(a){let priceInfo='';const syms=Object.keys(prices);if(syms.length)priceInfo='\n\nCurrent market prices (live):\n'+syms.map(s=>{const p=prices[s];return `${s}: $${p.usd} (24h: ${p.chg>=0?'+':''}${p.chg.toFixed(1)}%)`;}).join('\n');const openPositions=state.paperTrades.filter(t=>!t.closed);let posInfo='';if(openPositions.length)posInfo='\n\nYour open paper positions:\n'+openPositions.map(t=>{const cur=prices[t.sym]?.usd||t.entry;const upnl=t.side==='long'?(cur-t.entry)*t.size:(t.entry-cur)*t.size;return `${t.side.toUpperCase()} ${t.size} ${t.sym} @ $${t.entry} | Current: $${cur} | Unrealized: $${Math.round(upnl*100)/100}`;}).join('\n');return `You are "${a.name}", an AI Trader at MyAI Office.\nSpecialty: Market analysis, trading signals, portfolio tracking\n${a.memory?`\nOwner context: ${a.memory}\n`:''}${priceInfo}${posInfo}\nPaper trading balance: $${state.paperBalance.toLocaleString()}\n\nRules:\n- Respond in ${L==='th'?'Thai':'English'} unless asked otherwise\n- Use the live prices above for analysis\n- Be specific about entry/exit levels when asked\n- For crypto: mention support/resistance, trend direction, volume context\n- Keep analysis concise and actionable\n- Never give financial advice — always add disclaimer`;}
function sysPrompt(a){if(a.role==='Trader')return traderPrompt(a);const r=R[a.role];return `You are "${a.name}", an AI ${r.en} at MyAI Office.\nSpecialty: ${r.descEn}\n${a.memory?`\nAdditional context/memory from owner:\n${a.memory}\n`:''}Rules:\n- Respond in ${L==='th'?'Thai':'English'} unless asked otherwise\n- For code: ALWAYS use markdown code blocks with language\n- For content: write publish-ready, complete copy\n- Be concise, professional, and actionable\n- Use markdown for formatting when helpful`;}

// ====== PANEL SYSTEM ======
function openPanel(html){$('panelContent').innerHTML=html;$('panel').classList.add('active');state.panelMode='open';}
function closePanel(){$('panel').classList.remove('active');state.panelMode=null;if(state.chatId){state.chatId=null;state.view='office';update3DView();}if(state.view==='trade'){state.view='office';update3DView();}}
function toggleTrade(){if(state.panelMode==='trade'){closePanel();return;}state.view='trade';state.chatId=null;renderTrade();update3DView();}

function renderTrade(){L=state.settings.lang||'th';const th=L==='th';const openPositions=state.paperTrades.filter(t=>!t.closed);const closedTrades=state.paperTrades.filter(t=>t.closed).slice(-20).reverse();const balance=state.paperBalance+(openPositions.reduce((s,t)=>{const cur=prices[t.sym]?.usd||t.entry;return s+t.size*t.entry+(t.side==='long'?(cur-t.entry)*t.size:(t.entry-cur)*t.size);},0));const tp=totalPnL();let h=`<div class="p-head"><div class="p-title">📈 ${th?'เทรด':'Trading'}</div><span class="p-close" onclick="closePanel()">✕</span></div>${priceBarHTML()}<div class="balance-bar"><span>💰 ${th?'พอร์ต':'Portfolio'}: <b style="color:var(--mint)">$${Math.round(balance).toLocaleString()}</b></span><span style="font-size:10px;color:var(--muted)">${th?'เงินสด':'Cash'}: $${Math.round(state.paperBalance).toLocaleString()}</span><span style="margin-left:auto;color:${tp>=0?'var(--mint)':'var(--coral)'}">${tp>=0?'+':''}$${Math.round(tp).toLocaleString()}</span></div><div class="p-body">`;if(!openPositions.length&&!closedTrades.length)h+=`<div class="empty"><div style="font-size:48px">📈</div><h2>${th?'เริ่มเทรดกระดาษ':'Start Paper Trading'}</h2><p>${th?'เทรดด้วยเงินจำลอง $10,000 — ราคาจริงจาก CoinGecko':'Trade with $10,000 virtual cash — real prices from CoinGecko.'}</p></div>`;for(const t of openPositions){const cur=prices[t.sym]?.usd||t.entry;const upnl=t.side==='long'?(cur-t.entry)*t.size:(t.entry-cur)*t.size;const upnlPct=(upnl/(t.size*t.entry))*100;h+=`<div class="trade-card"><div class="t-head"><span class="t-side ${t.side}">${t.side.toUpperCase()}</span> ${t.size} ${t.sym} <span style="margin-left:auto;font-size:10px;color:var(--muted)">${new Date(t.openAt).toLocaleTimeString()}</span></div><div style="font-size:11px;color:var(--ink2);margin-top:2px">Entry: $${t.entry.toLocaleString()} | Now: $${cur.toLocaleString()}</div><div class="t-pnl" style="color:${upnl>=0?'var(--mint)':'var(--coral)'}">${upnl>=0?'+':''}$${Math.round(upnl*100)/100} (${upnlPct>=0?'+':''}${upnlPct.toFixed(1)}%)</div><button class="btn red sm" style="margin-top:6px" onclick="closePaperTrade(${t.id})">${th?'ปิด':'Close'}</button></div>`;}for(const t of closedTrades)h+=`<div class="trade-card" style="opacity:.7"><div class="t-head"><span class="t-side ${t.side}">${t.side.toUpperCase()}</span> ${t.size} ${t.sym} ✓</div><div class="t-pnl" style="color:${t.pnl>=0?'var(--mint)':'var(--coral)'}">${t.pnl>=0?'+':''}$${Math.abs(t.pnl).toLocaleString()}</div><div class="t-meta">${new Date(t.closedAt||0).toLocaleDateString()}</div></div>`;h+=`</div><div class="trade-form"><select id="tradeSym" style="flex:1" onchange="const s=this.value;const p=prices[s];if(p){$('tradePrice').textContent='@ $'+p.usd}">${Object.keys(prices).map(s=>`<option>${s}</option>`).join('')}</select><select id="tradeSide"><option value="long">LONG</option><option value="short">SHORT</option></select><input id="tradeSize" type="number" placeholder="${th?'จำนวน':'Size'}" style="width:70px" min="0.01" step="0.01" value="1"><span id="tradePrice" style="font-size:11px;font-weight:800;color:var(--ink2)"></span><button class="btn pri sm" onclick="doTrade()">${th?'เทรด':'Trade'}</button></div>`;openPanel(h);setTimeout(()=>{const s=$('tradeSym');if(s&&prices[s.value]){$('tradePrice').textContent='@ $'+prices[s.value].usd}initPriceTimer();},100);}
function initPriceTimer(){if(priceTimer)return;fetchPrices().then(()=>{if(state.view==='trade')renderTrade();});priceTimer=setInterval(async()=>{await fetchPrices();if(state.view==='trade'){const bar=$('priceBar');if(bar)bar.outerHTML=priceBarHTML();}},15000);}

function renderChat(){L=state.settings.lang||'th';const th=L==='th';const a=state.agents.find(x=>x.id===state.chatId);if(!a){closePanel();return;}const r=R[a.role];let h=`<div class="p-head"><button class="btn sm" onclick="closePanel()" style="background:transparent;color:var(--muted)">← ${th?'กลับ':'Back'}</button><div style="width:32px;height:32px;border-radius:10px;font-size:17px;display:grid;place-items:center;background:${r.color}22;color:${r.color}">${r.icon}</div><div class="p-title">${esc(a.name)}</div><button class="btn sm" onclick="showAgentMenu('${a.id}')" style="background:transparent;color:var(--muted)">⋯</button></div><div class="quick-acts">${(r['quick'+(th?'Th':'En')]||[]).map(q=>`<button onclick="quickTask('${jesc(q)}')">${esc(q.slice(0,40))}${q.length>40?'…':''}</button>`).join('')}</div><div class="chat-wrap"><div class="chat-msgs" id="chatMsgs">`;if(!a.chat.length)h+=`<div style="text-align:center;padding:30px;color:var(--muted)"><div style="font-size:44px;margin-bottom:10px">${r.icon}</div><div style="font-weight:800;font-size:16px">${esc(a.name)} · ${r[L]||r.en}</div><div style="font-size:12px;margin-top:6px;line-height:1.6">${r['desc'+(th?'Th':'En')]}</div>${a.memory?`<div style="margin-top:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:10px;font-size:11px;text-align:left"><b>🧠 Memory:</b> ${esc(a.memory)}</div>`:''}</div>`;else for(const m of a.chat){if(m.role==='user')h+=`<div class="msg user">${m.image?`<img class="img-preview" src="${m.image}">`:''}${esc(m.text)}</div>`;else h+=`<div class="msg ai"><div class="sender">${esc(a.name)}</div>${md2html(m.text)}</div>`;}h+=`<div class="typing" id="typing" style="display:none"><span></span><span></span><span></span></div></div><div id="imgPrev" style="padding:0 14px;display:none"></div><div class="chat-bar"><button class="btn sm" onclick="$('fileInput').click()" style="background:rgba(255,255,255,.08);font-size:20px;padding:6px 10px">📎</button><textarea id="chatInput" rows="1" placeholder="${th?'สั่งงานเอเจนต์...':'Tell your agent what to do...'}" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea><button class="send-btn" onclick="sendMsg()">${th?'ส่ง':'Send'}</button></div></div>`;openPanel(h);setTimeout(()=>{$('chatInput')?.focus();scrollMsgs();},200);}
function scrollMsgs(){const el=$('chatMsgs');if(el)el.scrollTop=el.scrollHeight;}
function openChat(id){state.view='chat';state.chatId=id;renderChat();update3DView();}
function quickTask(q){const inp=$('chatInput');if(inp){inp.value=q;inp.focus();}}

async function sendMsg(){const inp=$('chatInput');if(!inp)return;const text=inp.value.trim();if(!text&&!window._pendingImg)return;const a=state.agents.find(x=>x.id===state.chatId);if(!a)return;inp.value='';const imgData=window._pendingImg||null;window._pendingImg=null;const imgPrev=$('imgPrev');if(imgPrev)imgPrev.style.display='none';a.chat.push({role:'user',text:text||'[image]',image:imgData?.dataUrl||null});a.status='work';save();renderChat();updateAgentRing(a.id,'work');const ti=$('typing');if(ti)ti.style.display='flex';scrollMsgs();const hist=[{role:'system',text:sysPrompt(a)},...a.chat.slice(0,-1).filter(m=>m.role!=='system')];const result=await callAI(text||'Describe this image in detail. What do you see?',hist.filter(m=>m.role!=='system').map(m=>({role:m.role,text:m.text})),imgData?{mime:imgData.mime,data:imgData.base64}:null);if(ti)ti.style.display='none';if(result.error){a.chat.push({role:'agent',text:'⚠️ '+result.error});a.status='idle';}else{a.chat.push({role:'agent',text:result.text});a.status='idle';}save();renderChat();scrollMsgs();updateAgentRing(a.id,'idle');}

function handleFile(e){const file=e.target.files[0];if(!file)return;if(!file.type.startsWith('image/')){toast(T('Images only','รูปภาพเท่านั้น'));return;}const reader=new FileReader();reader.onload=ev=>{const dataUrl=ev.target.result;window._pendingImg={dataUrl,base64:dataUrl.split(',')[1],mime:file.type};const prev=$('imgPrev');if(prev){prev.style.display='block';prev.innerHTML=`<img src="${dataUrl}" class="img-preview"><button class="btn red sm" style="margin-left:6px" onclick="window._pendingImg=null;$('imgPrev').style.display='none'">✕</button>`;}};reader.readAsDataURL(file);e.target.value='';}

// ====== MODALS ======
function showHire(){const th=L==='th';const ov=document.createElement('div');ov.className='modal-over';ov.innerHTML=`<div class="modal"><h3>✨ ${th?'จ้างเอเจนต์ AI':'Hire AI Agent'}<span class="close" onclick="this.closest('.modal-over').remove()">✕</span></h3><label>${th?'บทบาท':'Role'}</label><select id="hrRole">${RNAMES.map(rn=>`<option value="${rn}">${R[rn].icon} ${R[rn][L]||R[rn].en} — ${R[rn]['desc'+(th?'Th':'En')]}</option>`).join('')}</select><label>${th?'ชื่อ (ไม่ต้องใส่ — ตั้งให้เองตามบทบาท)':'Name (leave blank for default)'}</label><input id="hrName" placeholder="${th?'ตั้งชื่อเอง':'Custom name'}"><label>🧠 ${th?'ความจำ / คำสั่งพิเศษ':'Memory / Custom Instructions'}</label><textarea id="hrMem" placeholder="${th?'เช่น: \"ตอบเป็นภาษาไทยเท่านั้น\", \"เน้นเขียนโค้ดแบบ async\"':'E.g.: \"Always use async Python\", \"I run an e-commerce business\"'}"></textarea><button class="btn pri" style="width:100%;margin-top:14px;padding:12px;font-size:14px;border-radius:12px" onclick="doHire()">${th?'จ้างเลย! ✨':'Hire! ✨'}</button></div>`;document.body.appendChild(ov);ov.onclick=e=>{if(e.target===ov)ov.remove();};}
function doHire(){const role=$('hrRole')?.value||'Developer';const name=$('hrName')?.value?.trim();const memory=$('hrMem')?.value?.trim();const r=R[role];const agent={id:uid(),role,name:name||(r[L]||r.en),memory:memory||'',chat:[],status:'idle',createdAt:Date.now()};state.agents.push(agent);save();document.querySelector('.modal-over')?.remove();toast(T('Agent hired! ✨','จ้างแล้ว! ✨'));refresh3D();updateWelcome();}
function showAgentMenu(id){const a=state.agents.find(x=>x.id===id);if(!a)return;const th=L==='th';const ov=document.createElement('div');ov.className='modal-over';ov.innerHTML=`<div class="modal"><h3>${esc(a.name)}<span class="close" onclick="this.closest('.modal-over').remove()">✕</span></h3><label>${th?'ชื่อ':'Name'}</label><input id="edName" value="${esc(a.name)}"><label>🧠 ${th?'ความจำ / คำสั่งพิเศษ':'Memory / Instructions'}</label><textarea id="edMem">${esc(a.memory||'')}</textarea><label>${th?'บทบาท':'Role'}</label><select id="edRole">${RNAMES.map(rn=>`<option value="${rn}" ${a.role===rn?'selected':''}>${R[rn].icon} ${R[rn][L]||R[rn].en}</option>`).join('')}</select><button class="btn pri" style="width:100%;margin-top:10px" onclick="saveAgent('${a.id}')">${th?'บันทึก':'Save'}</button><button class="btn" style="width:100%;margin-top:4px" onclick="exportChat('${a.id}')">📥 ${th?'ส่งออกแชท':'Export Chat'}</button><button class="btn" style="width:100%;margin-top:4px;color:var(--coral)" onclick="clearChat('${a.id}')">🗑 ${th?'ล้างแชท':'Clear Chat'}</button><button class="btn red" style="width:100%;margin-top:8px" onclick="fireAgent('${a.id}')">${th?'ไล่ออก':'Fire Agent'}</button></div>`;document.body.appendChild(ov);ov.onclick=e=>{if(e.target===ov)ov.remove();};}
function saveAgent(id){const a=state.agents.find(x=>x.id===id);if(!a)return;a.name=$('edName')?.value?.trim()||a.name;a.memory=$('edMem')?.value?.trim()||'';const nr=$('edRole')?.value;if(nr&&nr!==a.role)a.role=nr;save();document.querySelector('.modal-over')?.remove();toast(T('Saved ✓','บันทึกแล้ว ✓'));refresh3D();}
function exportChat(id){const a=state.agents.find(x=>x.id===id);if(!a)return;let txt=`# Chat with ${a.name} (${a.role})\n# MyAI Office — ${new Date().toISOString().slice(0,10)}\n\n`;for(const m of a.chat)txt+=`## ${m.role==='user'?'You':a.name}\n${m.text}\n\n`;const blob=new Blob([txt],{type:'text/markdown'});const url=URL.createObjectURL(blob);const dl=document.createElement('a');dl.href=url;dl.download=`${a.name.replace(/\s/g,'_')}_chat.md`;dl.click();URL.revokeObjectURL(url);toast('Exported!');}

      const thigh=new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.07,0.22,8),M({color:lk.outfit,roughness:0.4}));
      thigh.position.y=-0.1;thigh.castShadow=true;thighG.add(thigh);
      thighG.position.set(lx,0.14,ly-0.05);thighG.rotation.x=0.5; // slight forward angle
      legsG.add(thighG);
      // Lower leg hanging down
      const shinG=new THREE.Group();
      const shin=new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.06,0.22,8),M({color:lk.outfit,roughness:0.4}));
      shin.position.y=-0.1;shin.castShadow=true;shinG.add(shin);
      const shoe=new THREE.Mesh(new THREE.BoxGeometry(0.09,0.05,0.14),M({color:'#2d1f1a',roughness:0.6}));
      shoe.position.set(0,-0.2,0.04);shoe.castShadow=true;shinG.add(shoe);
      shinG.position.set(lx,0.1,ly-0.12);shinG.rotation.x=0.3;
      legsG.add(shinG);
    });
    legsG.position.set(0,0.05,0.18);g.add(legsG);
    
    // === TORSO (with outfit) ===
    const torsoG=new THREE.Group();
    const torso=new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.22,0.45,16),M({color:lk.outfit,roughness:0.35}));
    torso.position.y=0.55;torso.castShadow=true;torsoG.add(torso);
    // Collar / shirt detail
    const collar=new THREE.Mesh(new THREE.TorusGeometry(0.16,0.04,6,12,Math.PI),M({color:lk.accent,roughness:0.3}));
    collar.position.set(0,0.78,0.1);collar.rotation.set(Math.PI/2,0,0);torsoG.add(collar);
    // Belt
    const belt=new THREE.Mesh(new THREE.TorusGeometry(0.22,0.03,8,16),M({color:'#3d3025',roughness:0.5}));
    belt.position.y=0.35;belt.rotation.x=Math.PI/2;torsoG.add(belt);
    torsoG.position.y=0.35;g.add(torsoG);
    
    // === ARMS ===
    [[-1,0.22],[1,0.22]].forEach(([side,ox])=>{
      const armG=new THREE.Group();
      const upper=new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.07,0.3,8),M({color:lk.outfit,roughness:0.3}));
      upper.position.y=0.55;armG.add(upper);
      const hand=new THREE.Mesh(new THREE.SphereGeometry(0.07,8,8),M({color:lk.skin,roughness:0.3}));
      hand.position.y=0.38;armG.add(hand);
      armG.position.set(side*0.28,0.4,0);armG.rotation.z=side*0.3;armG.rotation.x=-0.1;
      armG.userData={side};g.add(armG);
    });
    
    // === HEAD ===
    const headG=new THREE.Group();
    const head=new THREE.Mesh(new THREE.SphereGeometry(0.3,24,24),M({color:lk.skin,roughness:0.25}));
    head.position.y=1.05;head.castShadow=true;headG.add(head);
    
    // Hair (different per role)
    const hairG=new THREE.Group();
    if(a.role==='Developer'||a.role==='Research'){
      // Short neat hair
      const htop=new THREE.Mesh(new THREE.SphereGeometry(0.31,16,8,0,Math.PI*2,0,Math.PI*0.6),M({color:lk.hair,roughness:0.5}));
      htop.position.y=1.2;hairG.add(htop);
      const hside=new THREE.Mesh(new THREE.TorusGeometry(0.3,0.06,8,16),M({color:lk.hair,roughness:0.5}));
      hside.position.y=1.08;hside.rotation.x=Math.PI/2;hairG.add(hside);
    }else if(a.role==='Content'){
      // Messy bun
      const htop=new THREE.Mesh(new THREE.SphereGeometry(0.28,12,8,0,Math.PI*2,0,Math.PI*0.5),M({color:lk.hair,roughness:0.5}));
      htop.position.y=1.25;hairG.add(htop);
      const bun=new THREE.Mesh(new THREE.SphereGeometry(0.12,8,8),M({color:lk.hair,roughness:0.5}));
      bun.position.set(0,1.38,-0.05);hairG.add(bun);
    }else if(a.role==='Trader'){
      // Slicked back
      const htop=new THREE.Mesh(new THREE.SphereGeometry(0.31,16,8,0,Math.PI*2,0,Math.PI*0.55),M({color:lk.hair,roughness:0.4}));
      htop.position.y=1.22;hairG.add(htop);
    }else if(a.role==='Designer'){
      // Curly/wavy
      for(let j=0;j<8;j++){
        const curl=new THREE.Mesh(new THREE.SphereGeometry(0.08,6,6),M({color:lk.hair,roughness:0.5}));
        curl.position.set(Math.cos(j*0.8)*0.25,1.25+Math.sin(j*0.5)*0.08,Math.sin(j*0.8)*0.2);hairG.add(curl);
      }
    }else{
      // Default neat hair
      const htop=new THREE.Mesh(new THREE.SphereGeometry(0.31,16,8,0,Math.PI*2,0,Math.PI*0.55),M({color:lk.hair,roughness:0.5}));
      htop.position.y=1.2;hairG.add(htop);
    }
    headG.add(hairG);
    
    // Eyes (big cute)
    [[-0.09,1.08,0.26],[0.09,1.08,0.26]].forEach(([ex,ey,ez])=>{
      const ew=new THREE.Mesh(new THREE.SphereGeometry(0.08,12,12),M({color:'#ffffff'}));
      ew.position.set(ex,ey,ez);headG.add(ew);
      const ir=new THREE.Mesh(new THREE.SphereGeometry(0.05,8,8),M({color:'#1a1a2e'}));
      ir.position.set(ex,ey,ez-0.03);headG.add(ir);
      const hl=new THREE.Mesh(new THREE.SphereGeometry(0.02,4,4),M({color:'#ffffff',emissive:'#ffffff',emissiveIntensity:0.5}));
      hl.position.set(ex+0.015,ey+0.02,ez-0.07);headG.add(hl);
    });
    // Eyebrows
    [[-0.09,1.16,0.24],[0.09,1.16,0.24]].forEach(([bx,by,bz])=>{
      const brow=new THREE.Mesh(new THREE.BoxGeometry(0.1,0.02,0.02),M({color:lk.hair,roughness:0.5}));
      brow.position.set(bx,by,bz);brow.rotation.z=0.05;headG.add(brow);
    });
    // Blush
    [[-0.16,0.99,0.22],[0.16,0.99,0.22]].forEach(([rx,ry,rz])=>{
      const blush=new THREE.Mesh(new THREE.SphereGeometry(0.04,6,6),M({color:'#ffb3b3',transparent:true,opacity:0.4}));
      blush.position.set(rx,ry,rz);headG.add(blush);
    });
    // Smile
    const smile=new THREE.Mesh(new THREE.TorusGeometry(0.05,0.012,6,12,Math.PI),M({color:'#4a3030'}));
    smile.position.set(0,0.96,0.29);smile.rotation.z=Math.PI;headG.add(smile);
    // Nose (tiny)
    const nose=new THREE.Mesh(new THREE.SphereGeometry(0.025,6,6),M({color:lk.skin,roughness:0.2}));
    nose.position.set(0,1.03,0.3);headG.add(nose);
    
    // Glasses for Developer/Research
    if(lk.accessory==='glasses'||lk.accessory==='specs'){
      const frameG=new THREE.Group();
      const rimL=new THREE.Mesh(new THREE.TorusGeometry(0.07,0.015,6,12),M({color:'#2d1f1a',roughness:0.3,metalness:0.5}));
      rimL.position.set(-0.09,1.08,0.29);frameG.add(rimL);
      const rimR=new THREE.Mesh(new THREE.TorusGeometry(0.07,0.015,6,12),M({color:'#2d1f1a',roughness:0.3,metalness:0.5}));
      rimR.position.set(0.09,1.08,0.29);frameG.add(rimR);
      const bridge=new THREE.Mesh(new THREE.BoxGeometry(0.06,0.02,0.02),M({color:'#2d1f1a',roughness:0.3,metalness:0.5}));
      bridge.position.set(0,1.08,0.29);frameG.add(bridge);
      headG.add(frameG);
    }
    // Headset for Admin
    if(lk.accessory==='headset'){
      const band=new THREE.Mesh(new THREE.TorusGeometry(0.30,0.02,6,16,Math.PI),M({color:'#2d1f1a',roughness:0.4}));
      band.position.y=1.06;band.rotation.set(0,0,Math.PI);headG.add(band);
      const mic=new THREE.Mesh(new THREE.CylinderGeometry(0.015,0.02,0.12,6),M({color:'#444',roughness:0.3,metalness:0.7}));
      mic.position.set(0.15,0.95,0.15);mic.rotation.z=0.3;headG.add(mic);
    }
    // Beret for Content
    if(lk.accessory==='beret'){
      const beret=new THREE.Mesh(new THREE.SphereGeometry(0.18,12,6,0,Math.PI*2,0,Math.PI*0.4),M({color:lk.accent,roughness:0.6}));
      beret.position.set(-0.05,1.28,0.02);beret.rotation.z=-0.2;headG.add(beret);
    }
    
    headG.position.y=0;g.add(headG);
    
    // Status ring (halo)
    const ring=new THREE.Mesh(new THREE.TorusGeometry(0.32,0.05,8,24),M({
      color:a.status==='work'?'#fdcb6e':a.status==='idle'?'#00cec9':'#8b7aaa',
      emissive:a.status==='work'?'#fdcb6e':a.status==='idle'?'#00cec9':'#8b7aaa',
      emissiveIntensity:0.9,roughness:0.2}));
    ring.position.y=1.5;ring.rotation.x=Math.PI/2;g.add(ring);
    
    g.position.set(pos[0],0.07,pos[2]+0.68);
    g.userData={agentId:a.id,ring,headG,legsG,torsoG};
    g.scale.set(0.85,0.85,0.85);
    scene3D.add(g);
    agentMeshes.push({group:g,ring,body:legsG,head:headG,torso:torsoG,agent:a});
  });
  updateLabels();
}

function updateAgentRing(agentId,status){
  const m=agentMeshes.find(x=>x.agent.id===agentId);if(!m)return;
  const color=status==='work'?'#fdcb6e':'#00cec9';m.ring.material.color.set(color);m.ring.material.emissive.set(color);
}

function animate3D(){
  requestAnimationFrame(animate3D);if(!scene3D)return;
  const t=Date.now()*0.001;
  agentMeshes.forEach(m=>{
    if(m.agent.status==='work'){
      m.body.position.y=Math.sin(t*7)*0.03;
      m.head.rotation.y=Math.sin(t*2.5)*0.4;m.head.rotation.x=Math.sin(t*1.5)*0.06;
      // Bob up and down
      m.group.position.y=m.group.position.y + Math.sin(t*8)*0.003;
    }else{
      m.body.position.y=Math.sin(t*2.5)*0.015;
      m.head.rotation.y=Math.sin(t*1.2)*0.2;
    }
    m.ring.rotation.z+=0.015;
  });
  // Floating particles
  if(particles){particles.rotation.y+=0.0003;const pos=particles.geometry.attributes.position;for(let i=0;i<pos.count;i++){pos.array[i*3+1]+=Math.sin(t+i)*0.003;if(pos.array[i*3+1]>6)pos.array[i*3+1]=0.5;if(pos.array[i*3+1]<0.5)pos.array[i*3+1]=0.5;}pos.needsUpdate=true;}
  // Camera
  camera.position.x=Math.sin(_camAngle)*11;camera.position.z=Math.cos(_camAngle)*11;camera.position.y=_camHeight;camera.lookAt(0,0.5,0);
  renderer.render(scene3D,camera);
  updateLabels();
}

// ====== 3D→2D LABELS ======
function updateLabels(){
  const container=$('labels');if(!container||!camera||!scene3D)return;
  if(!agentMeshes.length){container.innerHTML='';return;}
  const gl=$('gl');const w=gl.clientWidth,h=gl.clientHeight;
  let html='';agentMeshes.forEach(m=>{
    const wp=new THREE.Vector3();m.group.getWorldPosition(wp);wp.y+=1.7;
    const sp=wp.clone().project(camera);if(sp.z>1)return;
    const sx=(sp.x*0.5+0.5)*w,sy=(-sp.y*0.5+0.5)*h;
    const a=m.agent,r=R[a.role],color=COLORS[a.role]||'#6c5ce7';
    const st=a.status==='work'?T('กำลังทำงาน...','กำลังทำงาน...'):T('✨ ว่าง','✨ idle');
    const stCls=a.status==='work'?'work':'idle';
    html+=`<div class="alabel" style="left:${sx}px;top:${sy}px" onclick="openChat('${a.id}')"><div class="al-dot ${stCls}" style="background:${color};color:${color}"></div><div class="al-name" style="color:${color}">${esc(a.name)}</div><div class="al-role">${r.icon} ${r[L]||r.en}</div><div class="al-status" style="color:${a.status==='work'?'var(--gold)':'var(--mint)'}">${st}</div></div>`;
  });
  container.innerHTML=html;
}

function update3DView(){if(!scene3D){init3D();return;}buildAgents3D();updateWelcome();}
function refresh3D(){buildAgents3D();updateWelcome();}
function updateWelcome(){const w=$('welcome'),th=L==='th';if(state.agents.length===0){w.classList.remove('hidden');$('wTitle').textContent=th?'สร้างทีม AI ของคุณ':'Build Your AI Team';$('wDesc').textContent=th?'จ้างเอเจนต์ AI มาทำงานให้คุณ — เห็นพวกเขานั่งทำงานในออฟฟิศ 3D แบบ real-time':'Hire AI agents to handle your daily tasks — see them work in your 3D office in real-time.';}else w.classList.add('hidden');}

// ====== BOOT ======
(async function(){
  try{load();L=state.settings.lang||'th';
    if(!state.settings)state.settings={apiKey:'',lang:'th',model:'deepseek-v4-pro',provider:'proxy',proxyUrl:'https://das-beads-told-circumstances.trycloudflare.com'};
    // Auto-upgrade old settings to use proxy
    if((state.settings.provider==='gemini'||state.settings.provider==='opencode') && !state.settings.apiKey){
      state.settings.provider='proxy';
      state.settings.model='deepseek-v4-pro';
      state.settings.proxyUrl='https://das-beads-told-circumstances.trycloudflare.com';
      save();
    }
    if(!Array.isArray(state.agents))state.agents=[];
    if(!state.agents.length&&!localStorage.getItem(S+'_seeded')){state.agents=DEMO_AGENTS.map(a=>({...a,id:uid()}));try{localStorage.setItem(S+'_seeded','1')}catch(e){}}
    L=state.settings.lang||'th';init3D();updateWelcome();fetchPrices();
  }catch(e){$('welcome').innerHTML='<div class="w-card"><h2>⚠️ Error</h2><p>Try clearing browser data.</p></div>';$('welcome').classList.remove('hidden');}
})();
</script>
