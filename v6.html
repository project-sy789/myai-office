<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>MyAI Office — 3D AI Team</title>
<meta name="description" content="Hire AI agents, assign roles, and get real work done — in 3D.">
<meta name="theme-color" content="#7c5cff">
<style>
:root{
  --bg:#0f0b1a;--bg2:#1a1530;--bg3:#221d3a;--card:#1e1940;--cardHover:#25204d;
  --ink:#f0edfa;--ink2:#b8b0d0;--muted:#7068a0;--line:#2a2550;
  --grape:#7c5cff;--coral:#ff6b5f;--leaf:#22c97a;--gold:#ffb43c;--pink:#ff7eb6;--sky:#38bdf8;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:system-ui,-apple-system,sans-serif;color:var(--ink);background:var(--bg);overflow:hidden;touch-action:pan-x pan-y pinch-zoom}

/* 3D Canvas — always full screen */
#gl{position:fixed;inset:0;z-index:1}
#gl canvas{display:block}

/* Agent labels — positioned via JS */
#labels{position:fixed;inset:0;z-index:2;pointer-events:none}
.alabel{position:absolute;transform:translate(-50%,-50%);text-align:center;pointer-events:auto;cursor:pointer;transition:opacity .3s}
.alabel .al-dot{width:12px;height:12px;border-radius:50%;margin:0 auto 4px;border:2px solid rgba(255,255,255,.4);transition:all .3s}
.alabel .al-dot.idle{box-shadow:0 0 10px currentColor}
.alabel .al-dot.work{animation:pulse .8s infinite}
.alabel .al-name{font-weight:800;font-size:13px;text-shadow:0 1px 6px rgba(0,0,0,.8);line-height:1.2}
.alabel .al-role{font-size:9px;opacity:.7;text-transform:uppercase;letter-spacing:.05em}
.alabel .al-status{font-size:9px;opacity:.8;margin-top:1px}
.alabel:hover .al-name{color:#fff!important}
@keyframes pulse{0%,100%{box-shadow:0 0 8px currentColor}50%{box-shadow:0 0 20px currentColor,0 0 30px currentColor}}

/* HUD bar */
#hud{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:8px;padding:8px 14px;background:rgba(26,21,48,.9);backdrop-filter:blur(12px);border:1px solid var(--line);border-radius:16px}
#hud button{display:inline-flex;align-items:center;gap:5px;padding:9px 14px;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;border:none;font-family:inherit;white-space:nowrap;transition:all .15s;background:var(--bg3);color:var(--ink)}
#hud button:hover{filter:brightness(1.2)}
#hud button.pri{background:var(--grape);color:#fff}
#hud button.red{background:var(--coral);color:#fff}
#hud .badge{font-size:10px;padding:2px 6px;border-radius:5px;background:var(--grape);color:#fff;margin-left:2px}

/* Panel — slides up from bottom */
#panel{position:fixed;inset:0;z-index:20;pointer-events:none;display:flex;flex-direction:column}
#panel.active{pointer-events:auto}
#panel .p-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.4);opacity:0;transition:opacity .3s}
#panel.active .p-backdrop{opacity:1}
#panel .p-sheet{position:absolute;bottom:0;left:0;right:0;max-height:80vh;background:var(--bg2);border-top:1px solid var(--line);border-radius:18px 18px 0 0;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1)}
#panel.active .p-sheet{transform:translateY(0)}
#panel .p-head{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line);flex-shrink:0}
#panel .p-head .p-title{font-weight:900;font-size:15px;flex:1;min-width:0}
#panel .p-head .p-close{font-size:20px;cursor:pointer;color:var(--muted);padding:4px}
#panel .p-body{flex:1;overflow-y:auto;padding:12px}

/* Welcome overlay */
#welcome{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;pointer-events:none}
#welcome .w-card{background:rgba(26,21,48,.95);backdrop-filter:blur(16px);border:1px solid var(--line);border-radius:18px;padding:32px 24px;text-align:center;max-width:340px;pointer-events:auto}
#welcome .w-icon{font-size:56px;margin-bottom:12px}
#welcome h2{font-weight:900;margin-bottom:6px;font-size:20px}
#welcome p{font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.5}
#welcome.hidden{display:none}

/* Chat messages */
.msg{max-width:88%;padding:10px 14px;border-radius:16px;font-size:13.5px;line-height:1.5;animation:msgIn .25s ease;margin-bottom:6px}
.msg.user{align-self:flex-end;background:var(--grape);color:#fff;border-bottom-right-radius:4px}
.msg.ai{align-self:flex-start;background:var(--card);border:1px solid var(--line);border-bottom-left-radius:4px}
.msg.ai .sender{font-size:10px;font-weight:800;color:var(--muted);margin-bottom:4px}
.msg p{margin:4px 0}
.msg code{background:rgba(0,0,0,.3);padding:2px 6px;border-radius:4px;font-size:12px;font-family:'SF Mono',monospace}
.msg pre{background:#0d0a1a;border:1px solid var(--line);border-radius:10px;padding:12px;margin:8px 0;overflow-x:auto;font-size:12px;line-height:1.4;position:relative}
.msg pre .copy{position:absolute;top:4px;right:4px;padding:3px 8px;border-radius:5px;font-size:10px;background:var(--bg3);color:var(--ink2);cursor:pointer;border:none;font-weight:700;opacity:0;transition:opacity .2s}
.msg pre:hover .copy{opacity:1}
.msg blockquote{border-left:3px solid var(--grape);padding-left:10px;color:var(--ink2);margin:6px 0}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.typing{padding:8px 14px;background:var(--card);border-radius:14px;font-size:12px;color:var(--muted);display:flex;gap:3px;align-self:flex-start}
.typing span{width:5px;height:5px;border-radius:50%;background:var(--muted);animation:dotBounce 1.4s infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes dotBounce{0%,80%,100%{opacity:.3;transform:translateY(0)}40%{opacity:1;transform:translateY(-4px)}}

.chat-wrap{display:flex;flex-direction:column;height:100%}
.chat-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:6px}
.chat-bar{display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--line);background:var(--bg3);flex-shrink:0;align-items:flex-end}
.chat-bar textarea{flex:1;padding:9px 12px;border-radius:10px;border:1px solid var(--line);background:var(--bg);color:var(--ink);font-size:13.5px;outline:none;font-family:inherit;resize:none;min-height:40px;max-height:120px;line-height:1.4}
.chat-bar textarea:focus{border-color:var(--grape)}
.chat-bar .send-btn{padding:9px 16px;border-radius:10px;background:var(--grape);color:#fff;font-weight:800;font-size:13px;border:none;cursor:pointer}
.quick-acts{display:flex;gap:5px;flex-wrap:wrap;padding:8px 12px;border-top:1px solid var(--line);background:var(--bg3);flex-shrink:0}
.quick-acts button{padding:5px 9px;border-radius:7px;font-size:10.5px;font-weight:700;border:1px solid var(--line);background:var(--bg);color:var(--ink2);cursor:pointer;white-space:nowrap}
.quick-acts button:hover{background:var(--grape);color:#fff;border-color:var(--grape)}

/* Price bar */
.price-bar{display:flex;gap:6px;padding:8px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;flex-shrink:0;background:var(--bg3);border-bottom:1px solid var(--line)}
.price-chip{flex-shrink:0;padding:5px 10px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;background:var(--bg);white-space:nowrap}
.price-chip .sym{color:var(--ink);margin-right:4px}
.price-chip .val{color:var(--ink2)}
.price-chip .chg{font-size:10px;margin-left:4px}
.price-chip .chg.up{color:var(--leaf)}.price-chip .chg.down{color:var(--coral)}
.balance-bar{display:flex;align-items:center;gap:12px;padding:10px 14px;font-size:12px;background:var(--bg2);border-bottom:1px solid var(--line);flex-shrink:0;flex-wrap:wrap}
.trade-card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:8px}
.trade-card .t-head{display:flex;align-items:center;gap:8px;font-weight:800;font-size:13px}
.trade-card .t-side{padding:2px 8px;border-radius:5px;font-size:10px;font-weight:900;text-transform:uppercase}
.trade-card .t-side.long{background:#22c97a22;color:var(--leaf)}
.trade-card .t-side.short{background:#ff6b5f22;color:var(--coral)}
.trade-card .t-pnl{font-weight:900;font-size:14px;margin-top:4px}
.trade-card .t-meta{font-size:10px;color:var(--muted);margin-top:4px}
.trade-form{display:flex;gap:6px;padding:10px 12px;border-top:1px solid var(--line);background:var(--bg3);flex-shrink:0;align-items:center;flex-wrap:wrap}
.trade-form select,.trade-form input{padding:7px 10px;border-radius:8px;border:1px solid var(--line);background:var(--bg);color:var(--ink);font-size:12px;font-family:inherit}
.trade-form select:focus,.trade-form input:focus{border-color:var(--grape);outline:none}

/* Modal */
.modal-over{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.7);display:grid;place-items:center;padding:16px;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg2);border:1px solid var(--line);border-radius:16px;padding:20px;width:100%;max-width:420px;max-height:88vh;overflow-y:auto}
.modal h3{font-weight:900;margin-bottom:12px;display:flex;align-items:center;gap:8px;font-size:16px}
.modal h3 .close{margin-left:auto;cursor:pointer;font-size:18px;color:var(--muted)}
.modal label{display:block;font-size:10.5px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:10px 0 4px}
.modal input,.modal select,.modal textarea{width:100%;padding:10px 12px;border-radius:9px;border:1px solid var(--line);background:var(--bg);color:var(--ink);font-size:13.5px;font-family:inherit;outline:none}
.modal input:focus,.modal select:focus,.modal textarea:focus{border-color:var(--grape)}
.modal textarea{resize:vertical;min-height:70px}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--bg);padding:10px 22px;border-radius:12px;font-weight:800;font-size:13px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;box-shadow:0 8px 30px rgba(0,0,0,.4)}
.toast.show{opacity:1}
input[type=file]{display:none}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 12px;border-radius:9px;font-weight:700;font-size:12.5px;cursor:pointer;border:none;background:var(--bg3);color:var(--ink);transition:all .15s;font-family:inherit;white-space:nowrap}
.btn:hover{filter:brightness(1.15)}
.btn.pri{background:var(--grape);color:#fff}
.btn.red{background:var(--coral);color:#fff}
.btn.sm{padding:5px 9px;font-size:11px}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty h2{font-weight:900;margin-bottom:6px;color:var(--ink)}
.empty p{font-size:13px;margin-bottom:14px;line-height:1.4}
.img-preview{max-width:120px;max-height:80px;border-radius:8px;margin:4px 0;border:1px solid var(--line)}
@media(max-width:400px){#hud{padding:6px 10px;gap:4px}#hud button{padding:7px 10px;font-size:11px}}
</style>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
</head>
<body>
<div id="gl"></div>
<div id="labels"></div>
<div id="welcome"><div class="w-card"><div class="w-icon">🏢</div><h2 id="wTitle">สร้างทีม AI ของคุณ</h2><p id="wDesc">จ้างเอเจนต์ AI มาทำงานให้คุณ — เห็นพวกเขานั่งทำงานในออฟฟิศ 3D แบบ real-time</p><button class="btn pri" onclick="showHire()" style="font-size:14px;padding:10px 20px">+ จ้างเอเจนต์คนแรก</button></div></div>
<div id="hud">
  <button onclick="showHire()">➕ <span id="hudHire">จ้าง</span></button>
  <button onclick="toggleTrade()">📈 <span id="hudTrade">เทรด</span></button>
  <button onclick="showSettings()">⚙️</button>
</div>
<div id="panel"><div class="p-backdrop" onclick="closePanel()"></div><div class="p-sheet"><div id="panelContent"></div></div></div>
<div id="toast" class="toast"></div>
<input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFile(event)">
<script>
// ============ MyAI Office v6 — 3D-First ============
const $=id=>document.getElementById(id);
const S='myaioffice_v6';
let state={
  agents:[], settings:{apiKey:'',lang:'th',model:'gemini-2.0-flash',provider:'gemini',proxyUrl:'http://localhost:8765'},
  view:'office', chatId:null, panelMode:null,
  paperBalance:10000, paperTrades:[], tradeId:0
};
const DEMO_AGENTS=[
  {id:'demo_dev',role:'Developer',name:'Mint',memory:'ตอบเป็นภาษาไทย',chat:[],status:'idle',createdAt:Date.now()-86400000},
  {id:'demo_trader',role:'Trader',name:'Boss',memory:'วิเคราะห์เด่น BTC ETH SOL',chat:[],status:'idle',createdAt:Date.now()-86400000}
];
let prices={}, priceTimer=null, L='en', _toastTimer=null;

function save(){try{localStorage.setItem(S,JSON.stringify(state))}catch(e){}}
function load(){try{const s=localStorage.getItem(S);if(s)state=JSON.parse(s)}catch(e){}}
const esc=s=>String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c]);
const jesc=s=>String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
const uid=()=>'a'+Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const T=(en,th)=>L==='th'?th:en;
function toast(m,d=2500){
  const t=$('toast');t.textContent=m;t.classList.add('show');
  clearTimeout(_toastTimer);_toastTimer=setTimeout(()=>t.classList.remove('show'),d);
}

// ====== ROLES ======
const R={
  Developer:{icon:'💻',color:'#38bdf8',en:'Developer',th:'นักพัฒนา',descEn:'Writes code, debugs, builds apps & APIs',descTh:'เขียนโค้ด แก้บั๊ค สร้างแอพและ API',
    quickEn:['Write a Python script to...','Debug this code:','Build a REST API for...','Create a React component...'],
    quickTh:['เขียน Python script สำหรับ...','แก้บั๊คโค้ดนี้:','สร้าง REST API สำหรับ...','สร้าง React component...']},
  Content:{icon:'🎬',color:'#ff7eb6',en:'Content Creator',th:'ครีเอเตอร์',descEn:'Creates videos, posts, reels, captions',descTh:'ทำวิดีโอ โพสต์ Reels แคปชั่น',
    quickEn:['Write a TikTok script about...','Draft 5 social media posts...','Create a YouTube video outline...','Write engaging captions for...'],
    quickTh:['เขียนสคริปต์ TikTok...','ร่างโพสต์โซเชียล 5 อัน...','ทำโครงวิดีโอ YouTube...','เขียนแคปชั่นสำหรับ...']},
  Trader:{icon:'📈',color:'#22c97a',en:'Trader',th:'นักเทรด',descEn:'Analyzes markets, tracks PnL, trading signals',descTh:'วิเคราะห์ตลาด ติดตามพอร์ต สัญญาณเทรด',
    quickEn:['Analyze BTC/USD trend...','Calculate risk/reward for...','Review my portfolio...','What are key levels for...'],
    quickTh:['วิเคราะห์แนวโน้ม BTC...','คำนวณ risk/reward...','รีวิวพอร์ตโฟลิโอ...','แนวรับแนวต้านของ...']},
  Designer:{icon:'🎨',color:'#ffb43c',en:'Designer',th:'ดีไซเนอร์',descEn:'Graphics, logos, thumbnails, branding',descTh:'กราฟิก โลโก้ ธัมบ์เนล แบรนด์ดิ้ง',
    quickEn:['Design a logo concept for...','Suggest a color palette for...','Create thumbnail ideas for...','Brand identity for...'],
    quickTh:['ออกแบบโลโก้สำหรับ...','แนะนำชุดสีสำหรับ...','ไอเดียธัมบ์เนล...','สร้างแบรนด์ identity...']},
  Research:{icon:'🔍',color:'#7c5cff',en:'Researcher',th:'นักวิจัย',descEn:'Summarizes, analyzes data, writes reports',descTh:'สรุป วิเคราะห์ข้อมูล เขียนรายงาน',
    quickEn:['Research the market for...','Summarize this topic:','Compare X vs Y...','Find latest trends in...'],
    quickTh:['วิจัยตลาดสำหรับ...','สรุปหัวข้อนี้:','เปรียบเทียบ X กับ Y...','หาเทรนด์ล่าสุดเกี่ยวกับ...']},
  Admin:{icon:'📋',color:'#a78bfa',en:'Admin',th:'แอดมิน',descEn:'Customer replies, schedules, documentation',descTh:'ตอบลูกค้า จัดตาราง ทำเอกสาร',
    quickEn:['Draft an email response to...','Create a schedule for...','Write documentation for...','Customer FAQ for...'],
    quickTh:['ร่างอีเมลตอบกลับ...','สร้างตารางงานสำหรับ...','เขียนเอกสารสำหรับ...','FAQ ลูกค้าสำหรับ...']}
};
const RNAMES=Object.keys(R);

// ====== AI API (unchanged) ======
async function callAI(prompt,hist,imgData){
  const s=state.settings;
  if(s.provider==='opencode')return callOpenCode(prompt,hist);
  if(s.provider==='proxy')return callProxy(prompt,hist,imgData);
  return callGemini(prompt,hist,imgData);
}
async function callOpenCode(prompt,hist){
  const key=state.settings.apiKey;if(!key)return{error:'No API key — open ⚙️ Settings'};
  try{
    const res=await fetch('https://opencode.ai/zen/go/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({model:'deepseek-v4-pro',messages:[...hist.filter(m=>m.role!=='system').map(m=>({role:m.role==='user'?'user':'assistant',content:m.text})),{role:'user',content:prompt}],max_tokens:4096,temperature:0.7})});
    const d=await res.json();if(d.error)return{error:d.error.message||'API error'};
    let text=d.choices?.[0]?.message?.content||'';
    if(!text&&d.choices?.[0]?.message?.reasoning_content)text='[คิดแล้ว]\n\n'+d.choices[0].message.reasoning_content.slice(-500);
    return{text:text||'(empty)'};
  }catch(e){return{error:'Network error — OpenCode may block browser CORS. Try Proxy mode instead.'};}
}
async function callProxy(prompt,hist,imgData){
  const url=(state.settings.proxyUrl||'http://localhost:8765')+'/api/chat';
  try{
    const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:state.settings.model||'deepseek-v4-pro',messages:[...hist.filter(m=>m.role!=='system').map(m=>({role:m.role,content:m.text})),{role:'user',content:prompt}],max_tokens:4096})});
    const d=await res.json();if(d.error)return{error:d.error};return{text:d.choices?.[0]?.message?.content||'(empty)'};
  }catch(e){return{error:'Proxy not reachable — start the proxy server or use Gemini instead.'};}
}
async function callGemini(prompt,hist,imgData){
  const key=state.settings.apiKey;if(!key)return{error:'No API key — open ⚙️ Settings'};
  const model=state.settings.model||'gemini-2.0-flash';
  const parts=[{text:prompt}];if(imgData)parts.push({inline_data:{mime_type:imgData.mime||'image/png',data:imgData.data}});
  try{
    const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({contents:[...hist.map(h=>({role:h.role==='user'?'user':'model',parts:[{text:h.text}]})),{role:'user',parts}],generationConfig:{temperature:0.7,maxOutputTokens:4096}})});
    const d=await res.json();if(d.error)return{error:d.error.message||'API error'};
    return{text:d.candidates?.[0]?.content?.parts?.[0]?.text||'(empty response)'};
  }catch(e){return{error:'Network error — check connection'};}
}

// ====== COINGECKO ======
const COINS=['bitcoin','ethereum','solana','ripple','cardano','dogecoin','avalanche-2','polkadot'];
const COIN_MAP={bitcoin:'BTC',ethereum:'ETH',solana:'SOL',ripple:'XRP',cardano:'ADA',dogecoin:'DOGE','avalanche-2':'AVAX',polkadot:'DOT'};
async function fetchPrices(){
  try{const r=await fetch('https://api.coingecko.com/api/v3/simple/price?ids='+COINS.join(',')+'&vs_currencies=usd&include_24hr_change=true');
    const d=await r.json();for(const[id,data]of Object.entries(d)){const sym=COIN_MAP[id]||id.toUpperCase();prices[sym]={usd:data.usd,chg:data.usd_24h_change||0};}}catch(e){}
}
function priceBarHTML(){
  let h='<div class="price-bar" id="priceBar">';const syms=Object.keys(prices);
  if(!syms.length)return h+'<span style="color:var(--muted);font-size:11px;padding:8px">'+T('Loading prices...','กำลังโหลดราคา...')+'</span></div>';
  for(const sym of syms){const p=prices[sym];const cls=p.chg>=0?'up':'down';
    h+=`<div class="price-chip" onclick="quickTrade('${sym}')"><span class="sym">${sym}</span><span class="val">$${p.usd<1?p.usd.toFixed(4):p.usd<10?p.usd.toFixed(2):p.usd.toLocaleString()}</span><span class="chg ${cls}">${p.chg>=0?'+':''}${p.chg.toFixed(1)}%</span></div>`;}

// ====== PAPER TRADING ======
function openPaperTrade(sym,side,size){
  const p=prices[sym];if(!p)return toast(T('Price unavailable','ราคาไม่พร้อม'));
  const cost=size*p.usd;if(cost>state.paperBalance)return toast(T('Not enough balance','เงินไม่พอ'));
  state.paperBalance-=cost;const id=++state.tradeId;
  state.paperTrades.push({id,sym,side,size,entry:p.usd,openAt:Date.now(),closed:false,closePrice:null,pnl:null});
  save();renderTrade();toast(`${side.toUpperCase()} ${size} ${sym} @ $${p.usd.toLocaleString()}`);
}
function closePaperTrade(id){
  const t=state.paperTrades.find(x=>x.id===id);if(!t||t.closed)return;
  const p=prices[t.sym];if(!p)return toast('Price unavailable');
  const pnl=t.side==='long'?(p.usd-t.entry)*t.size:(t.entry-p.usd)*t.size;
  t.closed=true;t.closePrice=p.usd;t.pnl=Math.round(pnl*100)/100;t.closedAt=Date.now();
  state.paperBalance+=t.size*t.entry+pnl;save();renderTrade();
  toast(`Closed ${t.sym}: ${pnl>=0?'+':''}$${Math.abs(t.pnl).toLocaleString()}`);
}
function totalPnL(){let pnl=0;for(const t of state.paperTrades)if(t.pnl!=null)pnl+=t.pnl;return pnl;}
function doTrade(){
  const sym=$('tradeSym')?.value,side=$('tradeSide')?.value,size=parseFloat($('tradeSize')?.value);
  if(!sym||!side||!(size>0))return toast(T('Fill all fields','กรอกให้ครบ'));
  openPaperTrade(sym,side,size);
}

// ====== MARKDOWN ======
function md2html(t){
  if(!t)return'';let h=esc(t);
  h=h.replace(/```(\w*)\n?([\s\S]*?)```/g,(_,lang,code)=>
    '<pre><span class="lang" style="position:absolute;top:6px;right:36px;font-size:9px;color:var(--muted);font-weight:800;text-transform:uppercase">'+esc(lang||'')+'</span><button class="copy" onclick="copyCode(this)">Copy</button>'+esc(code.trimEnd())+'</pre>');
  h=h.replace(/`([^`]+)`/g,'<code>$1</code>');
  h=h.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');h=h.replace(/\*(.+?)\*/g,'<em>$1</em>');
  h=h.replace(/^### (.+)$/gm,'<strong>$1</strong>');h=h.replace(/^## (.+)$/gm,'<strong style="font-size:1.1em">$1</strong>');h=h.replace(/^# (.+)$/gm,'<strong style="font-size:1.2em">$1</strong>');
  h=h.replace(/^- (.+)$/gm,'<li>$1</li>');h=h.replace(/((?:<li>.*<\/li>\n?)+)/g,'<ul>$1</ul>');
  h=h.replace(/^\d+\. (.+)$/gm,'<li>$1</li>');h=h.replace(/^&gt; (.+)$/gm,'<blockquote>$1</blockquote>');
  h=h.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');
  h=h.replace(/\n\n/g,'</p><p>');h=h.replace(/\n/g,'<br>');h='<p>'+h+'</p>';h=h.replace(/<p>\s*<\/p>/g,'');
  return h;
}
function copyCode(btn){const code=btn.parentElement.textContent.replace('Copy','').trim();navigator.clipboard.writeText(code).then(()=>{btn.textContent='Copied!';setTimeout(()=>btn.textContent='Copy',1500);}).catch(()=>toast('Copy failed'));}

async function sendMsg(){
  const inp=$('chatInput');if(!inp)return;const text=inp.value.trim();if(!text&&!window._pendingImg)return;
  const a=state.agents.find(x=>x.id===state.chatId);if(!a)return;
  inp.value='';const imgData=window._pendingImg||null;window._pendingImg=null;
  const imgPrev=$('imgPrev');if(imgPrev)imgPrev.style.display='none';
  a.chat.push({role:'user',text:text||'[image]',image:imgData?.dataUrl||null});a.status='work';
  save();renderChat();updateAgentRing(a.id,'work');
  const ti=$('typing');if(ti)ti.style.display='flex';scrollMsgs();
  const hist=[{role:'system',text:sysPrompt(a)},...a.chat.slice(0,-1).filter(m=>m.role!=='system')];
  const result=await callAI(text||'Describe this image in detail. What do you see?',hist.filter(m=>m.role!=='system').map(m=>({role:m.role,text:m.text})),imgData?{mime:imgData.mime,data:imgData.base64}:null);
  if(ti)ti.style.display='none';
  if(result.error){a.chat.push({role:'agent',text:'⚠️ '+result.error});a.status='idle';}else{a.chat.push({role:'agent',text:result.text});a.status='idle';}
  save();renderChat();scrollMsgs();updateAgentRing(a.id,'idle');
}

    <button class="btn" style="width:100%;margin-top:4px;color:var(--coral);font-size:11px" onclick="doReset()">${th?'ล้างข้อมูลทั้งหมด':'Reset Everything'}</button></div>`;
  document.body.appendChild(ov);ov.onclick=e=>{if(e.target===ov)ov.remove();};
}
function reloadSettings(){const ov=document.querySelector('.modal-over');if(ov){const m=ov.querySelector('.modal');if(m)ov.remove();showSettings();}}
function doSaveSettings(){const key=$('setKey')?.value?.trim();if(key)state.settings.apiKey=key;const proxy=$('setProxy')?.value?.trim();if(proxy)state.settings.proxyUrl=proxy;save();document.querySelector('.modal-over')?.remove();refresh3D();toast(T('Saved ✓','บันทึกแล้ว ✓'));}
function doReset(){if(!confirm(T('Delete everything?','ลบทุกอย่าง?')))return;try{localStorage.removeItem(S)}catch(e){}state={agents:[],settings:{apiKey:'',lang:'th',model:'gemini-2.0-flash',provider:'gemini',proxyUrl:'http://localhost:8765'},view:'office',chatId:null,paperBalance:10000,paperTrades:[],tradeId:0};closePanel();refresh3D();updateWelcome();}

// ====== 3D ENGINE ======
let scene3D=null,camera,renderer,raycaster,agentMeshes=[],deskMeshes=[];
let _camAngle=0.5,_camHeight=7,_prevMouse={x:0,y:0},_isDragging=false,_clickStart={x:0,y:0};
const COLORS={Developer:'#38bdf8',Content:'#ff7eb6',Trader:'#22c97a',Designer:'#ffb43c',Research:'#7c5cff',Admin:'#a78bfa'};

function init3D(){
  if(scene3D)return;
  const gl=$('gl');if(!gl||!window.THREE)return;
  scene3D=new THREE.Scene();scene3D.background=new THREE.Color('#0f0b1a');
  camera=new THREE.PerspectiveCamera(50,gl.clientWidth/Math.max(gl.clientHeight,1),0.5,50);
  camera.position.set(8,7,12);camera.lookAt(0,0,0);
  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(gl.clientWidth,gl.clientHeight);renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.shadowMap.enabled=true;gl.appendChild(renderer.domElement);
  raycaster=new THREE.Raycaster();

  // Lights
  scene3D.add(new THREE.AmbientLight('#b8b0d0',2.5));
  const dl=new THREE.DirectionalLight('#ffffff',3);dl.position.set(5,10,3);dl.castShadow=true;scene3D.add(dl);
  const fl=new THREE.PointLight('#7c5cff',2,15);fl.position.set(0,3,0);scene3D.add(fl);

  // Floor
  const floor=new THREE.Mesh(new THREE.PlaneGeometry(14,10),new THREE.MeshStandardMaterial({color:'#2a2040',roughness:0.8}));
  floor.rotation.x=-Math.PI/2;floor.receiveShadow=true;scene3D.add(floor);
  for(let x=-6;x<=6;x+=2)for(let z=-4;z<=4;z+=2){const tile=new THREE.Mesh(new THREE.PlaneGeometry(1.8,1.8),new THREE.MeshStandardMaterial({color:(x+z)%4===0?'#2a2550':'#221d3a',roughness:0.7}));tile.rotation.x=-Math.PI/2;tile.position.set(x+0.9,0.01,z+0.9);tile.receiveShadow=true;scene3D.add(tile);}

  // Walls
  const wm=new THREE.MeshStandardMaterial({color:'#1a1530',roughness:0.9});
  [{w:14,h:5,d:0.3,x:0,y:2.5,z:-5},{w:14,h:5,d:0.3,x:0,y:2.5,z:5},{w:0.3,h:5,d:10,x:-7,y:2.5,z:0}].forEach(b=>{const m=new THREE.Mesh(new THREE.BoxGeometry(b.w,b.h,b.d),wm);m.position.set(b.x,b.y,b.z);m.receiveShadow=true;scene3D.add(m);});

  // Desks
  const dm=new THREE.MeshStandardMaterial({color:'#3a3060',roughness:0.5});
  const deskPos=[[-4,0,-2.5],[0,0,-2.5],[4,0,-2.5],[-4,0,2.5],[0,0,2.5],[4,0,2.5]];
  deskPos.forEach(([x,y,z])=>{const g=new THREE.Group();const top=new THREE.Mesh(new THREE.BoxGeometry(1.6,0.1,1),dm);top.position.y=0.9;top.castShadow=true;top.receiveShadow=true;g.add(top);[0.7,0.7,-0.7,-0.7].forEach((lx,i)=>{const leg=new THREE.Mesh(new THREE.BoxGeometry(0.08,0.9,0.08),dm);leg.position.set(i<2?lx:-lx,0.45,i<2?-0.45:0.45);leg.castShadow=true;g.add(leg);});const scr=new THREE.Mesh(new THREE.BoxGeometry(0.7,0.45,0.05),new THREE.MeshStandardMaterial({color:'#16314c',emissive:'#16314c',emissiveIntensity:0.5}));scr.position.set(0,1.15,-0.35);g.add(scr);g.position.set(x,y,z);scene3D.add(g);deskMeshes.push({group:g,screen:scr});});

  // Controls
  gl.addEventListener('pointerdown',e=>{_isDragging=true;_clickStart.x=e.clientX;_clickStart.y=e.clientY;_prevMouse.x=e.clientX;_prevMouse.y=e.clientY;});
  window.addEventListener('pointerup',()=>_isDragging=false);
  window.addEventListener('pointermove',e=>{if(!_isDragging)return;_camAngle-=(e.clientX-_prevMouse.x)*0.005;_camHeight=Math.max(3,Math.min(12,_camHeight+(e.clientY-_prevMouse.y)*0.03));_prevMouse.x=e.clientX;_prevMouse.y=e.clientY;});
  gl.addEventListener('wheel',e=>{_camHeight=Math.max(3,Math.min(12,_camHeight+e.deltaY*0.01));});
  gl.addEventListener('click',e=>{const dx=e.clientX-_clickStart.x,dy=e.clientY-_clickStart.y;if(Math.abs(dx)>5||Math.abs(dy)>5)return;const rect=gl.getBoundingClientRect();const mouse=new THREE.Vector2(((e.clientX-rect.left)/rect.width)*2-1,-((e.clientY-rect.top)/rect.height)*2+1);raycaster.setFromCamera(mouse,camera);const hits=raycaster.intersectObjects(agentMeshes.map(a=>a.group),true);if(hits.length>0){let obj=hits[0].object;while(obj){const aid=obj.userData?.agentId;if(aid){openChat(aid);return;}obj=obj.parent;}}});

  window.addEventListener('resize',()=>{if(!renderer||!camera)return;const gl=$('gl');camera.aspect=gl.clientWidth/Math.max(gl.clientHeight,1);camera.updateProjectionMatrix();renderer.setSize(gl.clientWidth,gl.clientHeight);});

  buildAgents3D();animate3D();
}

function buildAgents3D(){
  if(!scene3D)return;
  agentMeshes.forEach(a=>scene3D.remove(a.group));agentMeshes=[];
  const agents=state.agents;if(!agents.length){updateLabels();return;}
  const deskSlots=[[-4,0,-2.5],[0,0,-2.5],[4,0,-2.5],[-4,0,2.5],[0,0,2.5],[4,0,2.5]];
  agents.slice(0,6).forEach((a,i)=>{const pos=deskSlots[i]||[0,0,0];const color=COLORS[a.role]||'#7c5cff';const g=new THREE.Group();
    const bodyG=new THREE.Group();const cyl=new THREE.Mesh(new THREE.CylinderGeometry(0.18,0.18,0.35,12),new THREE.MeshStandardMaterial({color,roughness:0.3}));cyl.position.y=0.72;cyl.castShadow=true;bodyG.add(cyl);const bot=new THREE.Mesh(new THREE.SphereGeometry(0.22,12,6,0,Math.PI*2,0,Math.PI/2),new THREE.MeshStandardMaterial({color,roughness:0.3}));bot.position.y=0.55;bot.castShadow=true;bodyG.add(bot);const top2=new THREE.Mesh(new THREE.SphereGeometry(0.22,12,6,0,Math.PI*2,Math.PI/2,Math.PI/2),new THREE.MeshStandardMaterial({color,roughness:0.3}));top2.position.y=0.9;top2.castShadow=true;bodyG.add(top2);bodyG.position.y=0.85;g.add(bodyG);
    const head=new THREE.Mesh(new THREE.SphereGeometry(0.28,16,16),new THREE.MeshStandardMaterial({color,roughness:0.2}));head.position.y=1.35;head.castShadow=true;g.add(head);
    [[-0.1,1.4,0.25],[0.1,1.4,0.25]].forEach(([ex,ey,ez])=>{const eye=new THREE.Mesh(new THREE.SphereGeometry(0.06,8,8),new THREE.MeshStandardMaterial({color:'#ffffff'}));eye.position.set(ex,ey,ez);g.add(eye);const pupil=new THREE.Mesh(new THREE.SphereGeometry(0.03,8,8),new THREE.MeshStandardMaterial({color:'#0f0b1a'}));pupil.position.set(ex,ey,ez-0.04);g.add(pupil);});
    const ring=new THREE.Mesh(new THREE.TorusGeometry(0.25,0.04,8,16),new THREE.MeshStandardMaterial({color:a.status==='work'?'#ffb43c':a.status==='idle'?'#22c97a':'#7068a0',emissive:a.status==='work'?'#ffb43c':a.status==='idle'?'#22c97a':'#7068a0',emissiveIntensity:0.6}));ring.position.y=1.7;ring.rotation.x=Math.PI/2;g.add(ring);
    g.position.set(pos[0],pos[1]+0.3,pos[2]+0.7);g.userData={agentId:a.id,ring,bodyG,head};
    scene3D.add(g);agentMeshes.push({group:g,ring,body:bodyG,head,agent:a});
  });
  updateLabels();
}

function updateAgentRing(agentId,status){
  const m=agentMeshes.find(x=>x.agent.id===agentId);if(!m)return;
  const color=status==='work'?'#ffb43c':'#22c97a';m.ring.material.color.set(color);m.ring.material.emissive.set(color);
}

function animate3D(){
  requestAnimationFrame(animate3D);if(!scene3D)return;
  const t=Date.now()*0.001;
  agentMeshes.forEach(m=>{if(m.agent.status==='work'){m.body.position.y=0.85+Math.sin(t*8)*0.03;m.head.rotation.y=Math.sin(t*3)*0.2;}else m.body.position.y=0.85+Math.sin(t*3)*0.02;m.ring.rotation.z+=0.02;});
  camera.position.x=Math.sin(_camAngle)*10;camera.position.z=Math.cos(_camAngle)*10;camera.position.y=_camHeight;camera.lookAt(0,0.5,0);
  renderer.render(scene3D,camera);
  updateLabels();
}

// ====== 3D → 2D LABEL PROJECTION ======
function updateLabels(){
  const container=$('labels');if(!container||!camera||!scene3D)return;
  let html='';if(!agentMeshes.length){container.innerHTML='';return;}
  const gl=$('gl');const w=gl.clientWidth,h=gl.clientHeight;
  agentMeshes.forEach(m=>{
    const wp=new THREE.Vector3();m.group.getWorldPosition(wp);wp.y+=1.6;
    const sp=wp.clone().project(camera);
    const sx=(sp.x*0.5+0.5)*w, sy=(-sp.y*0.5+0.5)*h;
    if(sp.z>1)return; // behind camera
    const a=m.agent,r=R[a.role],color=COLORS[a.role]||'#7c5cff';
    const statusText=a.status==='work'?T('กำลังทำงาน...','กำลังทำงาน...'):T('ว่าง','ว่าง');
    const statusCls=a.status==='work'?'work':'idle';
    html+=`<div class="alabel" style="left:${sx}px;top:${sy}px" onclick="openChat('${a.id}')"><div class="al-dot ${statusCls}" style="background:${color};color:${color}"></div><div class="al-name" style="color:${color}">${esc(a.name)}</div><div class="al-role">${r.icon} ${r[L]||r.en}</div><div class="al-status" style="color:${a.status==='work'?'var(--gold)':'var(--leaf)'}">${statusText}</div></div>`;
  });
  container.innerHTML=html;
}

function update3DView(){
  if(!scene3D){init3D();return;}
  buildAgents3D();updateWelcome();
}
function refresh3D(){buildAgents3D();updateWelcome();}
function updateWelcome(){
  const w=$('welcome'),th=L==='th';
  if(state.agents.length===0){w.classList.remove('hidden');$('wTitle').textContent=th?'สร้างทีม AI ของคุณ':'Build Your AI Team';$('wDesc').textContent=th?'จ้างเอเจนต์ AI มาทำงานให้คุณ — เห็นพวกเขานั่งทำงานในออฟฟิศ 3D แบบ real-time':'Hire AI agents to handle your daily tasks — see them work in your 3D office in real-time.';}else w.classList.add('hidden');
}

// ====== BOOT ======
(async function(){
  try{load();L=state.settings.lang||'th';
    if(!state.settings)state.settings={apiKey:'',lang:'th',model:'gemini-2.0-flash',provider:'gemini',proxyUrl:'http://localhost:8765'};
    if(!Array.isArray(state.agents))state.agents=[];
    if(!state.agents.length&&!localStorage.getItem(S+'_seeded')){state.agents=DEMO_AGENTS.map(a=>({...a,id:uid()}));try{localStorage.setItem(S+'_seeded','1')}catch(e){}}
    L=state.settings.lang||'th';
    init3D();updateWelcome();
    fetchPrices();
  }catch(e){$('welcome').innerHTML='<div class="w-card"><h2>⚠️ Error</h2><p>Try clearing browser data.</p></div>';$('welcome').classList.remove('hidden');}
})();
</script>
